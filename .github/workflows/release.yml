name: 🚀 Create Release (Templates Only)
on:
  workflow_call:
    inputs:
      base-branch:
        description: 'Base branch to use for the builds'
        type: string
      repo:
        description: 'Repository to use for the build'
        type: string
      release_repo:
        description: 'Repository to use for the release'
        type: string
        default: ''
      tag:
        description: 'tag to use for the build'
        type: string
      tag_release:
        description: 'tag to use for releasing the build'
        type: string
      module_flags:
        description: 'Extra module flags, e.g. module_webm_enabled=no'
        type: string
      platform_flags:
        description: 'Platform-specific module flags, e.g. disable_3d=yes'
        type: string
      build_flags:
        description: 'Additional SCons flags (replaces lto), e.g. lto=thin'
        type: string

env:
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  GODOT_BASE_BRANCH: ${{ inputs.base-branch }}
  SCONSFLAGS: verbose=yes warnings=extra werror=yes strict_checks=yes debug_symbols=no ${{ inputs.module_flags }}

jobs:
  release:
    name: Create Template Release
    runs-on: macos-latest
    env:
      BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
      P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
      KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          repository: ${{ inputs.repo }}
          ref: ${{ inputs.tag }}
          submodules: recursive

      - uses: actions/download-artifact@v8
        with:
          path: bin
          merge-multiple: true

      - name: List downloaded bin
        run: ls -R bin || true

      - name: Setup Python and SCons
        uses: ./.github/actions/godot-deps

      - name: Select Xcode 26
        run: sudo xcode-select -s /Applications/Xcode_26.0.1.app

      - name: Checkout builder scripts (Vulkan, etc.)
        uses: actions/checkout@v6
        with:
          repository: appsinacup/action_godot_builder
          path: builder_repo
          fetch-depth: 1

      - name: Setup Vulkan SDK
        run: |
          sh builder_repo/install_vulkan_sdk_macos.sh

      - name: Mac Create Template Bundle
        run: |
          set -e
          cp -r misc/dist/macos_template.app ./bin
          mkdir -p bin/macos_template.app/Contents/MacOS
          cp bin/godot.macos.template_release.universal bin/macos_template.app/Contents/MacOS/godot_macos_release.universal || true
          cp bin/godot.macos.template_debug.universal bin/macos_template.app/Contents/MacOS/godot_macos_debug.universal || true
          chmod +x bin/macos_template.app/Contents/MacOS/godot_macos* || true
          cd bin && zip -q -9 -r macos.zip macos_template.app && cd ..

      - name: Assemble Android sources (debug + release) into one zip (if present)
        run: |
          set -e
          mkdir -p work/android_release work/android_debug work/android_src || true
          if [ -f bin/android_source.release.zip ]; then unzip -q bin/android_source.release.zip -d work/android_release; fi
          if [ -f bin/android_source.debug.zip ]; then unzip -q bin/android_source.debug.zip -d work/android_debug; fi
          cp -a work/android_release/. work/android_src/ || true
          mkdir -p work/android_src/libs/debug work/android_src/libs/release || true
          cp -a work/android_debug/libs/debug/. work/android_src/libs/debug/ || true
          ( cd work/android_src && zip -q -9 -r ../../bin/android_source.zip . ) || true

      - name: Package templates
        run: |
          set -e
          mkdir -p release/templates

          cp bin/godot.linuxbsd.template_debug.x86_64 "release/templates/linux_debug.x86_64" || true
          cp bin/godot.linuxbsd.template_release.x86_64 "release/templates/linux_release.x86_64" || true
          chmod +x release/templates/linux_debug.x86_64 release/templates/linux_release.x86_64 || true

          cp bin/godot.windows.template_debug.x86_64.exe "release/templates/windows_debug_x86_64.exe" || true
          cp bin/godot.windows.template_release.x86_64.exe "release/templates/windows_release_x86_64.exe" || true

          cp bin/godot.windows.template_debug.x86.exe "release/templates/windows_debug_x86.exe" || true
          cp bin/godot.windows.template_release.x86.exe "release/templates/windows_release_x86.exe" || true

          cp bin/godot.windows.template_debug.arm64.exe "release/templates/windows_debug_arm64.exe" || true
          cp bin/godot.windows.template_release.arm64.exe "release/templates/windows_release_arm64.exe" || true

          cp bin/macos.zip "release/templates/macos.zip" || true
          cp bin/godot_ios.zip "release/templates/ios.zip" || true
          cp -f bin/android_source.zip "release/templates/android_source.zip" || true
          cp -f bin/android_release.apk "release/templates/android_release.apk" || true
          cp -f bin/android_debug.apk "release/templates/android_debug.apk" || true

          cp bin/godot.web.template_release.wasm32.zip "release/templates/web_release.zip" || true
          cp bin/godot.web.template_debug.wasm32.zip "release/templates/web_debug.zip" || true

          printf "%s" "${{ inputs.tag_release }}" > release/templates/version.txt || true

          ls -R release/templates || true

      - name: List release directory
        run: ls -R release || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}-${{ inputs.tag_release }}_${{ inputs.platform_flags }}
          name: "Gonuts ${{ inputs.tag_release }} - ${{ inputs.platform_flags }}"
          repository: ${{ inputs.release_repo != '' && inputs.release_repo || github.repository }}
          token: ${{ secrets.GH_TOKEN }}
          body: |
            - Repo: [${{ inputs.repo }}](https://github.com/${{ inputs.repo }})
            - Base Version: ${{ inputs.tag_release }}
            - Build Flags: ${{ inputs.build_flags }}
            - Platform Flags: ${{ inputs.platform_flags }}
            - Template Module Flags: ${{ inputs.platform_flags }}
            - Build Branch: ${{ inputs.base-branch }}
          files: |
            release/Godot_v${{ inputs.tag_release }}_export_templates.tpz || true
