name: 🚀 Create Release

on:
  workflow_dispatch:
    inputs:
      request_id:
        description: "Unique ID for this request"
        type: string
        required: true
        default: ""
      repo:
        description: "Repository to use for the build"
        type: string
        default: "godotengine/godot"
      base-branch:
        description: "Base branch to use for the builds"
        type: string
        default: "4.6"
      tag:
        description: "tag to use for downloading the repo"
        type: string
        default: "4.6.1-stable"
      tag_release:
        description: "tag to use for releasing the build"
        type: string
        default: "4.6.1.stable"
      module_flags:
        description: "Extra module flags, e.g. module_webm_enabled=no"
        type: string
        default: ""
      template_module_flags:
        description: "Extra module flags for template build, e.g. disable_3d=yes"
        type: string
        default: ""
      encryption_key:
        description: "Optional encryption key to apply to template builds"
        type: string
        default: ""
      release_repo:
        description: "Repository to use for the release (leave empty for current repo)"
        type: string
        default: ""
      lto:
        description: 'LTO mode. Options: "none", "thin", "full"'
        type: choice
        default: "lto=thin"
        options:
          - "lto=none"
          - "lto=thin"
          - "lto=full"
  workflow_call:
    inputs:
      request_id:
        description: "Unique ID for this request"
        type: string
        required: true
        default: ""
      repo:
        required: false
        type: string
        default: "godotengine/godot"
      base-branch:
        required: false
        type: string
        default: "4.6"
      tag:
        required: false
        type: string
        default: "4.6.1-stable"
      tag_release:
        required: false
        type: string
        default: "4.6.1.stable"
      module_flags:
        required: false
        type: string
        default: ""
      template_module_flags:
        required: false
        type: string
        default: ""
      encryption_key:
        required: false
        type: string
        default: ""
      release_repo:
        required: false
        type: string
        default: ""
      lto:
        required: false
        type: string
        default: "lto=thin"

env:
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  GODOT_BASE_BRANCH: ${{ inputs.base-branch }}
  SCONSFLAGS: verbose=yes warnings=extra werror=yes strict_checks=yes debug_symbols=no ${{ inputs.module_flags }}
  APPLE_SIGNING_IDENTITY: ""

jobs:
  release:
    env:
      BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
      P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
      KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
      ENCRYPTION_KEY: ${{ inputs.encryption_key }}
    name: 🚀 Create Release
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          repository: ${{ inputs.repo }}
          ref: ${{ inputs.tag }}
          submodules: recursive

      - name: Setup Node.js 24 (for tools/actions)
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - uses: actions/download-artifact@v8
        with:
          path: bin
          merge-multiple: true

      - name: List downloaded bin
        run: ls -R bin

      - name: Setup Python and SCons
        uses: ./.github/actions/godot-deps

      - name: Validate and map encryption key
        if: ${{ inputs.encryption_key != '' }}
        env:
          ENCRYPTION_KEY_INPUT: ${{ inputs.encryption_key }}
        shell: sh
        run: |
          if echo "$ENCRYPTION_KEY_INPUT" | grep -Eq '[;&|<>`$]'; then
            echo 'encryption_key contains unsafe characters' >&2
            exit 1
          fi
          echo "ENCRYPTION_KEY=$ENCRYPTION_KEY_INPUT" >> $GITHUB_ENV

      - name: Mask encryption key
        if: ${{ inputs.encryption_key != '' }}
        run: echo "::add-mask::$ENCRYPTION_KEY"
        shell: sh

      - name: Select Xcode 26
        run: sudo xcode-select -s /Applications/Xcode_26.0.1.app

      - name: Checkout builder scripts (Vulkan, etc.)
        uses: actions/checkout@v6
        with:
          repository: appsinacup/action_godot_builder
          path: builder_repo
          fetch-depth: 1

      - name: Setup Vulkan SDK
        run: |
          sh misc/scripts/install_vulkan_sdk_macos.sh

      # Apple certificate (only if provided)
      - name: Install the Apple certificate
        if: ${{ env.BUILD_CERTIFICATE_BASE64 != '' }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH
          SIGNING_IDENTITY=$(security find-identity -v -p codesigning | awk -F'"' 'NR==1 {print $2}')
          echo "APPLE_SIGNING_IDENTITY=$SIGNING_IDENTITY" >> $GITHUB_ENV

      # --- Mac Editor Bundle (signed) ---
      - name: Mac Create Editor Bundle
        if: ${{ env.BUILD_CERTIFICATE_BASE64 != '' && hashFiles('bin/godot.macos.editor.universal') != '' }}
        run: |
          cp -r misc/dist/macos_tools.app ./bin/Godot.app
          mkdir -p bin/Godot.app/Contents/MacOS
          cp bin/godot.macos.editor.universal bin/Godot.app/Contents/MacOS/Godot
          chmod +x bin/Godot.app/Contents/MacOS/Godot
          codesign --force --timestamp --options=runtime --entitlements misc/dist/macos/editor.entitlements --sign "${{ env.APPLE_SIGNING_IDENTITY }}" bin/Godot.app
          zip -q -9 -r "Godot.universal.zip" bin/Godot.app
          /Applications/Xcode.app/Contents/Developer/usr/bin/notarytool store-credentials "AppleID" --apple-id "${{ secrets.APPLE_ID }}" --password "${{ secrets.APP_SPECIFIC_PASSWORD }}" --team-id "${{ secrets.APPLE_TEAM_ID }}"
          /Applications/Xcode.app/Contents/Developer/usr/bin/notarytool submit Godot.universal.zip --wait --keychain-profile "AppleID"
          xcrun stapler staple bin/Godot.app

      # --- Mac Mono Editor Bundle (signed) ---
      - name: Mac Create Mono Editor Bundle
        if: ${{ env.BUILD_CERTIFICATE_BASE64 != '' && hashFiles('bin/godot.macos.editor.mono.universal') != '' }}
        run: |
          cp -r misc/dist/macos_tools.app ./bin/Godot_mono.app
          cp -r bin/GodotSharp bin/Godot_mono.app/Contents/Resources
          mkdir -p bin/Godot_mono.app/Contents/MacOS
          cp bin/godot.macos.editor.mono.universal bin/Godot_mono.app/Contents/MacOS/Godot
          chmod +x bin/Godot_mono.app/Contents/MacOS/Godot
          codesign --force --timestamp --options=runtime --entitlements misc/dist/macos/editor.entitlements --sign "${{ env.APPLE_SIGNING_IDENTITY }}" bin/Godot_mono.app
          zip -q -9 -r "Godot_mono.universal.zip" bin/Godot_mono.app
          /Applications/Xcode.app/Contents/Developer/usr/bin/notarytool store-credentials "AppleID" --apple-id "${{ secrets.APPLE_ID }}" --password "${{ secrets.APP_SPECIFIC_PASSWORD }}" --team-id "${{ secrets.APPLE_TEAM_ID }}"
          /Applications/Xcode.app/Contents/Developer/usr/bin/notarytool submit Godot_mono.universal.zip --wait --keychain-profile "AppleID"
          xcrun stapler staple bin/Godot_mono.app

      # --- Mac Editor Bundle (unsigned) ---
      - name: Mac Create Editor Bundle (w/o Signing)
        if: ${{ env.BUILD_CERTIFICATE_BASE64 == '' && hashFiles('bin/godot.macos.editor.universal') != '' }}
        run: |
          cp -r misc/dist/macos_tools.app ./bin/Godot.app
          mkdir -p bin/Godot.app/Contents/MacOS
          cp bin/godot.macos.editor.universal bin/Godot.app/Contents/MacOS/Godot
          chmod +x bin/Godot.app/Contents/MacOS/Godot
          codesign --force --timestamp --options=runtime --entitlements misc/dist/macos/editor.entitlements -s - bin/Godot.app

      # --- Mac Mono Editor Bundle (unsigned) ---
      - name: Mac Create Mono Editor Bundle (w/o Signing)
        if: ${{ env.BUILD_CERTIFICATE_BASE64 == '' && hashFiles('bin/godot.macos.editor.mono.universal') != '' }}
        run: |
          cp -r misc/dist/macos_tools.app ./bin/Godot_mono.app
          cp -r bin/GodotSharp bin/Godot_mono.app/Contents/Resources
          mkdir -p bin/Godot_mono.app/Contents/MacOS
          cp bin/godot.macos.editor.mono.universal bin/Godot_mono.app/Contents/MacOS/Godot
          chmod +x bin/Godot_mono.app/Contents/MacOS/Godot
          codesign --force --timestamp --options=runtime --entitlements misc/dist/macos/editor.entitlements -s - bin/Godot_mono.app

      # --- Mac Template Bundle (non-mono) ---
      - name: Mac Create Template Bundle
        if: ${{ hashFiles('bin/godot.macos.template_release.universal') != '' || hashFiles('bin/godot.macos.template_debug.universal') != '' }}
        run: |
          cp -r misc/dist/macos_template.app ./bin
          mkdir -p bin/macos_template.app/Contents/MacOS
          [ -f bin/godot.macos.template_release.universal ] && cp bin/godot.macos.template_release.universal bin/macos_template.app/Contents/MacOS/godot_macos_release.universal
          [ -f bin/godot.macos.template_debug.universal ] && cp bin/godot.macos.template_debug.universal bin/macos_template.app/Contents/MacOS/godot_macos_debug.universal
          chmod +x bin/macos_template.app/Contents/MacOS/godot_macos* 2>/dev/null || true
          cd bin && zip -q -9 -r macos.zip macos_template.app && cd ..

      # --- Mac Template Bundle (mono) ---
      - name: Mac Create Template Bundle (Mono)
        if: ${{ hashFiles('bin/godot.macos.template_release.mono.universal') != '' || hashFiles('bin/godot.macos.template_debug.mono.universal') != '' }}
        run: |
          cp -r misc/dist/macos_template.app ./bin/macos_template.app
          mkdir -p bin/macos_template.app/Contents/MacOS
          [ -f bin/godot.macos.template_release.mono.universal ] && cp bin/godot.macos.template_release.mono.universal bin/macos_template.app/Contents/MacOS/godot_macos_release.universal
          [ -f bin/godot.macos.template_debug.mono.universal ] && cp bin/godot.macos.template_debug.mono.universal bin/macos_template.app/Contents/MacOS/godot_macos_debug.universal
          chmod +x bin/macos_template.app/Contents/MacOS/godot_macos* 2>/dev/null || true
          cd bin && zip -q -9 -r macos_mono.zip macos_template.app && cd ..

      # --- Android assembly (non-mono) ---
      - name: Assemble Android sources (debug + release) into one zip
        if: ${{ hashFiles('bin/android_source.release.zip') != '' && hashFiles('bin/android_source.debug.zip') != '' }}
        run: |
          mkdir -p work/android_release work/android_debug work/android_src
          unzip -q bin/android_source.release.zip -d work/android_release
          unzip -q bin/android_source.debug.zip -d work/android_debug
          cp -a work/android_release/. work/android_src/
          mkdir -p work/android_src/libs/debug work/android_src/libs/release
          cp -a work/android_debug/libs/debug/. work/android_src/libs/debug/
          ( cd work/android_src && zip -q -9 -r ../../bin/android_source.zip . )

      # --- Android assembly (mono) ---
      - name: Assemble Android mono sources (debug + release) into one zip
        if: ${{ hashFiles('bin/android_source.mono.release.zip') != '' && hashFiles('bin/android_source.mono.debug.zip') != '' }}
        run: |
          mkdir -p work/android_mono_release work/android_mono_debug work/android_mono_src
          unzip -q bin/android_source.mono.release.zip -d work/android_mono_release
          unzip -q bin/android_source.mono.debug.zip -d work/android_mono_debug
          cp -a work/android_mono_release/. work/android_mono_src/
          mkdir -p work/android_mono_src/libs/debug work/android_mono_src/libs/release
          cp -a work/android_mono_debug/libs/debug/. work/android_mono_src/libs/debug/
          ( cd work/android_mono_src && zip -q -9 -r ../../bin/android_source.mono.zip . )

      # --- Package per-platform editors and templates (dynamic) ---
      - name: Package per-platform editors and templates
        run: |
          set -e
          mkdir -p release release/templates release/templates_mono
          VERSION=${{ inputs.tag_release }}
          VERSION_CLEAN=${VERSION//-/.}

          # Helper: if file exists, rename and zip
          package_editor() {
            local src="$1"
            local dst_name="$2"
            if [ -f "$src" ]; then
              mv "$src" "bin/$dst_name"
              cd bin
              zip -q -9 -r "../release/${dst_name}.zip" "$dst_name"
              cd ..
            fi
          }

          # Non‑mono editors
          package_editor "bin/godot.linuxbsd.editor.x86_64" "Godot_v${VERSION}_linux.x86_64"
          package_editor "bin/godot.windows.editor.x86_64.exe" "Godot_v${VERSION}_win64.exe"
          package_editor "bin/godot.windows.editor.arm64.exe" "Godot_v${VERSION}_windows_arm64.exe"
          # macOS editor (already bundled as Godot.app)
          if [ -d "bin/Godot.app" ]; then
            cd bin
            zip -q -9 -r "../release/Godot_v${VERSION}_macos.universal.zip" Godot.app
            cd ..
          fi

          # Mono editors
          package_editor "bin/godot.windows.editor.x86_64.mono.exe" "Godot_v${VERSION}_mono_win64.exe"
          package_editor "bin/godot.windows.editor.arm64.mono.exe" "Godot_v${VERSION}_mono_windows_arm64.exe"
          package_editor "bin/godot.linuxbsd.editor.x86_64.mono" "Godot_v${VERSION}_mono_linux.x86_64"
          if [ -d "bin/Godot_mono.app" ]; then
            cd bin
            zip -q -9 -r "../release/Godot_v${VERSION}_mono_macos.universal.zip" Godot_mono.app
            cd ..
          fi

          # For mono Windows and Linux, we need to include GodotSharp folder.
          # We'll handle them separately after the package_editor moves them.
          # The package_editor above just moves the exe, but we need to bundle GodotSharp.
          # So we re‑package those manually if they exist.
          if [ -f "bin/Godot_v${VERSION}_mono_win64.exe" ]; then
            mkdir -p bin/Godot_v${VERSION}_mono_win64
            cp bin/Godot_v${VERSION}_mono_win64.exe bin/Godot_v${VERSION}_mono_win64/
            if [ -d "bin/GodotSharp" ]; then
              cp -R bin/GodotSharp bin/Godot_v${VERSION}_mono_win64/
            fi
            cd bin
            zip -q -9 -r "../release/Godot_v${VERSION}_mono_win64.zip" Godot_v${VERSION}_mono_win64
            cd ..
          fi
          if [ -f "bin/Godot_v${VERSION}_mono_windows_arm64.exe" ]; then
            mkdir -p bin/Godot_v${VERSION}_mono_windows_arm64
            cp bin/Godot_v${VERSION}_mono_windows_arm64.exe bin/Godot_v${VERSION}_mono_windows_arm64/
            if [ -d "bin/GodotSharp" ]; then
              cp -R bin/GodotSharp bin/Godot_v${VERSION}_mono_windows_arm64/
            fi
            cd bin
            zip -q -9 -r "../release/Godot_v${VERSION}_mono_windows_arm64.zip" Godot_v${VERSION}_mono_windows_arm64
            cd ..
          fi
          if [ -f "bin/Godot_v${VERSION}_mono_linux.x86_64" ]; then
            mkdir -p bin/Godot_v${VERSION}_mono_linux_x86_64
            cp bin/Godot_v${VERSION}_mono_linux.x86_64 bin/Godot_v${VERSION}_mono_linux_x86_64/
            chmod +x bin/Godot_v${VERSION}_mono_linux_x86_64/Godot_v${VERSION}_mono_linux.x86_64
            if [ -d "bin/GodotSharp" ]; then
              cp -R bin/GodotSharp bin/Godot_v${VERSION}_mono_linux_x86_64/
            fi
            cd bin
            zip -q -9 -r "../release/Godot_v${VERSION}_mono_linux_x86_64.zip" Godot_v${VERSION}_mono_linux_x86_64
            cd ..
          fi

          # --- Templates (non‑mono) ---
          # Copy template binaries if they exist
          copy_template() {
            local src="$1"
            local dst="$2"
            if [ -f "$src" ]; then
              cp "$src" "release/templates/$dst"
            fi
          }
          copy_template "bin/godot.linuxbsd.template_debug.x86_64" "linux_debug.x86_64"
          copy_template "bin/godot.linuxbsd.template_release.x86_64" "linux_release.x86_64"
          copy_template "bin/godot.windows.template_debug.x86_64.exe" "windows_debug_x86_64.exe"
          copy_template "bin/godot.windows.template_release.x86_64.exe" "windows_release_x86_64.exe"
          copy_template "bin/godot.windows.template_debug.x86_32.exe" "windows_debug_x86_32.exe"
          copy_template "bin/godot.windows.template_release.x86_32.exe" "windows_release_x86_32.exe"
          copy_template "bin/godot.windows.template_debug.arm64.exe" "windows_debug_arm64.exe"
          copy_template "bin/godot.windows.template_release.arm64.exe" "windows_release_arm64.exe"
          copy_template "bin/godot.windows.template_debug.x86_64.console.exe" "windows_debug_x86_64_console.exe"
          copy_template "bin/godot.windows.template_release.x86_64.console.exe" "windows_release_x86_64_console.exe"
          copy_template "bin/godot.windows.template_debug.x86_32.console.exe" "windows_debug_x86_32_console.exe"
          copy_template "bin/godot.windows.template_release.x86_32.console.exe" "windows_release_x86_32_console.exe"
          copy_template "bin/godot.windows.template_debug.arm64.console.exe" "windows_debug_arm64_console.exe"
          copy_template "bin/godot.windows.template_release.arm64.console.exe" "windows_release_arm64_console.exe"
          # macOS template zip
          if [ -f "bin/macos.zip" ]; then
            cp bin/macos.zip "release/templates/macos.zip"
          fi
          # iOS
          if [ -f "bin/godot_ios.zip" ]; then
            cp bin/godot_ios.zip "release/templates/ios.zip"
          fi
          # Android
          if [ -f "bin/android_source.zip" ]; then
            cp bin/android_source.zip "release/templates/android_source.zip"
          fi
          if [ -f "bin/android_release.apk" ]; then
            cp bin/android_release.apk "release/templates/android_release.apk"
          fi
          if [ -f "bin/android_debug.apk" ]; then
            cp bin/android_debug.apk "release/templates/android_debug.apk"
          fi
          # Web templates
          for web_template in web_release web_debug web_nothreads_release web_nothreads_debug web_dlink_release web_dlink_debug web_dlink_nothreads_release web_dlink_nothreads_debug; do
            src="bin/godot.web.template.${web_template}.wasm32.zip"
            if [ -f "$src" ]; then
              cp "$src" "release/templates/${web_template}.zip"
            fi
          done

          # version.txt
          printf "%s" "${VERSION_CLEAN}" > release/templates/version.txt

          # Encryption key if provided
          if [ -n "${ENCRYPTION_KEY}" ]; then
            mkdir -p release/templates/.godot
            FILE="release/templates/.godot/export_credentials.cfg"
            echo "" > "$FILE"
            for i in $(seq 0 5); do
              echo "[preset.$i]" >> "$FILE"
              echo "script_encryption_key=\"${ENCRYPTION_KEY}\"" >> "$FILE"
            done
          fi

          # --- Templates (mono) ---
          copy_template_mono() {
            local src="$1"
            local dst="$2"
            if [ -f "$src" ]; then
              cp "$src" "release/templates_mono/$dst"
            fi
          }
          copy_template_mono "bin/godot.windows.template_release.x86_64.mono.exe" "windows_release_x86_64.exe"
          copy_template_mono "bin/godot.windows.template_release.x86_64.mono.console.exe" "windows_release_x86_64_console.exe"
          copy_template_mono "bin/godot.windows.template_debug.x86_64.mono.exe" "windows_debug_x86_64.exe"
          copy_template_mono "bin/godot.windows.template_debug.x86_64.mono.console.exe" "windows_debug_x86_64_console.exe"
          if [ -f "bin/macos_mono.zip" ]; then
            cp bin/macos_mono.zip "release/templates_mono/macos.zip"
          fi
          copy_template_mono "bin/godot.linuxbsd.template_release.x86_64.mono" "linux_release.x86_64"
          copy_template_mono "bin/godot.linuxbsd.template_debug.x86_64.mono" "linux_debug.x86_64"
          if [ -f "bin/android_source.mono.zip" ]; then
            cp bin/android_source.mono.zip "release/templates_mono/android_source.zip"
          fi
          if [ -f "bin/android_monoRelease.apk" ]; then
            cp bin/android_monoRelease.apk "release/templates_mono/android_release.apk"
          fi
          if [ -f "bin/android_monoDebug.apk" ]; then
            cp bin/android_monoDebug.apk "release/templates_mono/android_debug.apk"
          fi
          if [ -f "bin/godot_ios_mono.zip" ]; then
            cp bin/godot_ios_mono.zip "release/templates_mono/ios.zip"
          fi
          printf "%s" "${VERSION_CLEAN}" > release/templates_mono/version.txt

          # Make template binaries executable
          chmod +x release/templates/linux_* release/templates_mono/linux_* 2>/dev/null || true

          # Create export template packages
          cd release
          # Non‑mono
          if [ "$(ls -A templates 2>/dev/null)" ]; then
            zip -q -r Godot_v${VERSION}_export_templates.tpz templates
          fi
          # Mono
          if [ "$(ls -A templates_mono 2>/dev/null)" ]; then
            mkdir -p mono_tpz_payload/templates
            cp -a templates_mono/. mono_tpz_payload/templates/
            (cd mono_tpz_payload && zip -q -r ../Godot_v${VERSION}_mono_export_templates.tpz templates)
          fi
          cd ..

          # Generate list of release files for later upload
          echo "RELEASE_FILES=" > release_files.env
          for f in release/*.zip release/*.tpz; do
            if [ -f "$f" ]; then
              echo "$f" >> release_files.env
            fi
          done

      - name: Package all artifacts into a single ZIP
        run: |
          set -e
          VERSION=${{ inputs.tag_release }}
          mkdir -p combined
          # Copy all .zip and .tpz files from release/ into combined/
          find release -maxdepth 1 -type f \( -name "*.zip" -o -name "*.tpz" \) -exec cp {} combined/ \;
          # Create the combined archive
          cd combined
          zip -q -9 -r "../Godot_v${VERSION}_all.zip" .
          cd ..
          # List the created archive
          ls -l Godot_v${VERSION}_all.zip
          - name: List release directory
              run: ls -R release

      - name: Set release files output
        id: set_files
        run: |
          VERSION=${{ inputs.tag_release }}
          echo "release_files=Godot_v${VERSION}_all.zip" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ inputs.request_id }}
          name: "Gonuts ${{ inputs.tag_release }} - ${{ inputs.template_module_flags }}"
          repository: ${{ inputs.release_repo != '' && inputs.release_repo || github.repository }}
          token: ${{ secrets.GH_TOKEN }}
          body: |
            - Repo: [${{ inputs.repo }}](https://github.com/${{ inputs.repo }})
            - Base Version: ${{ inputs.tag_release }}
            - Optimization: ${{ inputs.lto }}
            - Template Module Flags: ${{ inputs.template_module_flags }}
            - Build Branch: ${{ inputs.base-branch }}
          files: ${{ steps.set_files.outputs.release_files }}
