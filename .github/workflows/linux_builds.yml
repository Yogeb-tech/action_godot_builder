name: 🐧 Linux Builds
on:
  workflow_call:
    inputs:
      base-branch:
        description: "Base branch to use for the builds"
        type: string
      lto:
        description: 'LTO mode. Options: "none", "thin", "full"'
        type: string
      repo:
        description: "Repository to use for the build"
        type: string
      tag:
        description: "tag to use for the build"
        type: string
      module_flags:
        description: "Extra module flags, e.g. module_webm_enabled=no"
        type: string
      template_module_flags:
        description: "Extra module flags for template build, e.g. module_webm_enabled=no"
        type: string
      encryption_key:
        description: "Optional encryption key to apply to template builds"
        type: string
        default: ""
      run_editor:
        description: "Run editor builds"
        type: boolean
        default: true
      run_editor_mono:
        description: "Run editor mono builds"
        type: boolean
        default: false
      run_template:
        description: "Run template builds"
        type: boolean
        default: true
      run_template_mono:
        description: "Run template mono builds"
        type: boolean
        default: false

# Global Settings
env:
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  GODOT_BASE_BRANCH: ${{ inputs.base-branch }}
  SCONSFLAGS: verbose=yes warnings=extra werror=yes strict_checks=yes "accesskit_sdk_path=${{ github.workspace }}/accesskit-c-0.21.2/"
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  TSAN_OPTIONS: suppressions=misc/error_suppressions/tsan.txt
  UBSAN_OPTIONS: suppressions=misc/error_suppressions/ubsan.txt

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Editor (target=editor arch=x86_64)
            target: editor
            scons-flags: arch=x86_64
            scons-mono-flags: ""
            build-mono: false
            legacy-scons: false
            should_run: ${{ inputs.run_editor }}

          - name: Editor (target=editor arch=x86_32)
            target: editor
            scons-flags: arch=x86_32
            scons-mono-flags: ""
            build-mono: false
            legacy-scons: false
            should_run: ${{ inputs.run_editor }}

          - name: Template (target=template_release, arch=x86_64)
            target: template_release
            scons-flags: arch=x86_64
            scons-mono-flags: ""
            build-mono: false
            legacy-scons: false
            should_run: ${{ inputs.run_template }}

          - name: Template (target=template_debug, arch=x86_64)
            target: template_debug
            scons-flags: arch=x86_64
            scons-mono-flags: ""
            build-mono: false
            legacy-scons: false
            should_run: ${{ inputs.run_template }}

          - name: Editor Mono (target=editor arch=x86_64)
            target: editor
            scons-flags: arch=x86_64
            scons-mono-flags: module_mono_enabled=yes mono_glue=yes mono_static=yes
            build-mono: true
            legacy-scons: false
            should_run: ${{ inputs.run_editor_mono }}

          - name: Template Mono (target=template_release arch=x86_64)
            target: template_release
            scons-flags: arch=x86_64
            scons-mono-flags: module_mono_enabled=yes mono_glue=yes mono_static=yes
            build-mono: true
            legacy-scons: false
            should_run: ${{ inputs.run_template_mono }}

          - name: Template Mono (target=template_debug arch=x86_64)
            target: template_debug
            scons-flags: arch=x86_64
            scons-mono-flags: module_mono_enabled=yes mono_glue=yes mono_static=yes
            build-mono: true
            legacy-scons: false
            should_run: ${{ inputs.run_template_mono }}

    steps:
      - name: Check if build target is enabled
        if: matrix.should_run != true
        shell: pwsh
        run: |
          Write-Host "This build target (${{ matrix.name }}) has been disabled via runner inputs."
          Write-Host "Exiting step sequence cleanly without processing standard dependencies."
          exit 0

      - name: Checkout
        if: matrix.should_run == true
        uses: actions/checkout@v6
        with:
          repository: ${{ inputs.repo }}
          ref: ${{ inputs.tag }}
          submodules: recursive

      - name: Setup Node.js 24 (for tools/actions)
        if: matrix.should_run == true
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Setup dependencies
        if: matrix.should_run == true
        run: |
          sudo apt-get update
          sudo apt-get install libwayland-bin

      - name: Download and Extract AccessKit
        if: matrix.should_run == true
        shell: bash
        id: accesskit-sdk
        run: |
          # Create the target directory SCons expects
          mkdir -p accesskit-c-0.21.2

          # Download directly from GitHub Releases using native GH CLI (pre-installed on runners)
          if gh release download v0.21.2 --repo AccessKit/accesskit-c --pattern "accesskit-c-linux-x86_64.zip" --dir accesskit-c-0.21.2; then
              # Extract directly into that destination folder (-d)
              unzip -o accesskit-c-0.21.2/accesskit-c-linux-x86_64.zip -d accesskit-c-0.21.2
              echo "ACCESSKIT_ENABLED=yes" >> "$GITHUB_OUTPUT"
          else
              echo "::warning::AccessKit SDK installation failed, building without AccessKit support."
              echo "ACCESSKIT_ENABLED=no" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract pre-built AccessKit
        if: matrix.should_run == true
        run: unzip -o accesskit-c-0.21.2/accesskit_c.zip

      - name: Install 32-bit C++ build dependencies
        if: matrix.should_run == true && matrix.scons-flags == 'arch=x86_32'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-multilib g++-multilib libc6-dev-i386

      - name: Install Mono toolchain
        if: matrix.should_run == true && matrix.build-mono
        run: |
          sudo apt-get update
          sudo apt-get install -y mono-devel nuget

      - name: Setup .NET SDK
        if: matrix.should_run == true && matrix.build-mono
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "6.0.x"

      - name: Free disk space on runner
        if: matrix.should_run == true
        run: |
          echo "Disk usage before:" && df -h
          sudo rm -rf /usr/local/lib/android
          echo "Disk usage after:" && df -h

      - name: Restore Godot build cache
        if: matrix.should_run == true
        uses: ./.github/actions/godot-cache-restore
        with:
          cache-name: linux-${{ matrix.target }}-${{ matrix.scons-flags }}-${{ inputs.lto }}${{ matrix.build-mono && '-mono' || '' }}
        continue-on-error: true

      - name: Setup Python and SCons
        if: matrix.should_run == true && !matrix.legacy-scons
        uses: ./.github/actions/godot-deps

      - name: Map encryption key to step env and validate
        if: ${{ matrix.should_run == true && (inputs.encryption_key != '' && matrix.target != 'editor' && ((matrix['build-mono'] == true && (inputs.run_template_mono == 'true' || inputs.run_template_mono == true)) || (matrix['build-mono'] != true && (inputs.run_template == 'true' || inputs.run_template == true)))) }}
        env:
          ENCRYPTION_KEY_INPUT: ${{ inputs.encryption_key }}
        shell: sh
        run: |
          if echo "$ENCRYPTION_KEY_INPUT" | grep -Eq '[;&|<>`$]'; then
            echo 'encryption_key contains unsafe characters' >&2
            exit 1
          fi
          echo "ENCRYPTION_KEY=$ENCRYPTION_KEY_INPUT" >> $GITHUB_ENV

      - name: Mask encryption key
        if: ${{ matrix.should_run == true && (inputs.encryption_key != '' && matrix.target != 'editor' && ((matrix['build-mono'] == true && (inputs.run_template_mono == 'true' || inputs.run_template_mono == true)) || (matrix['build-mono'] != true && (inputs.run_template == 'true' || inputs.run_template == true)))) }}
        run: echo "::add-mask::$ENCRYPTION_KEY"
        shell: sh

      - name: Setup Python and SCons (legacy versions)
        if: matrix.should_run == true && matrix.legacy-scons
        uses: ./.github/actions/godot-deps
        with:
          python-version: 3.8
          scons-version: 4.0

      - name: Mono compilation (pre-glue)
        if: matrix.should_run == true && matrix.build-mono
        uses: ./.github/actions/godot-build
        with:
          scons-flags: ${{ env.SCONSFLAGS }} ${{ matrix.scons-flags }} ${{ contains(inputs.template_module_flags, 'lto=') && '' || inputs.lto }} ${{ inputs.module_flags }} module_mono_enabled=yes mono_glue=no
          platform: linuxbsd
          target: editor

      - name: Generate C# glue
        if: matrix.should_run == true && matrix.build-mono
        run: |
          ./bin/godot.linuxbsd.editor.x86_64.mono --headless --generate-mono-glue ./modules/mono/glue

      - name: Compilation (Editor)
        if: ${{ matrix.should_run == true && (matrix.target == 'editor' && ((matrix['build-mono'] == true && (inputs.run_editor_mono == 'true' || inputs.run_editor_mono == true)) || (matrix['build-mono'] != true && (inputs.run_editor == 'true' || inputs.run_editor == true)))) }}
        uses: ./.github/actions/godot-build
        with:
          scons-flags: ${{ env.SCONSFLAGS }} ${{ matrix.scons-flags }} ${{ matrix.scons-mono-flags }} ${{ contains(inputs.template_module_flags, 'lto=') && '' || inputs.lto }} ${{ inputs.module_flags }}
          platform: linuxbsd
          target: ${{ matrix.target }}

      - name: Compilation (Template)
        if: ${{ matrix.should_run == true && (matrix.target != 'editor' && ((matrix['build-mono'] == true && (inputs.run_template_mono == 'true' || inputs.run_template_mono == true)) || (matrix['build-mono'] != true && (inputs.run_template == 'true' || inputs.run_template == true)))) }}
        uses: ./.github/actions/godot-build
        env:
          SCRIPT_AES256_ENCRYPTION_KEY: ${{ inputs.encryption_key }}
        with:
          scons-flags: ${{ env.SCONSFLAGS }} ${{ matrix.scons-flags }} ${{ matrix.scons-mono-flags }} ${{ contains(inputs.template_module_flags, 'lto=') && '' || inputs.lto }} ${{ inputs.template_module_flags }}
          platform: linuxbsd
          target: ${{ matrix.target }}

      - name: Checkout builder repo (cache purge script)
        if: matrix.should_run == true
        uses: actions/checkout@v6
        with:
          repository: appsinacup/action_godot_builder
          path: builder_repo
          fetch-depth: 1

      - name: Save Godot build cache
        if: matrix.should_run == true
        uses: ./.github/actions/godot-cache-save
        with:
          cache-name: linux-${{ matrix.target }}-${{ matrix.scons-flags }}-${{ inputs.lto }}${{ matrix.build-mono && '-mono' || '' }}
        continue-on-error: true

      - name: Prepare artifact
        if: matrix.should_run == true
        run: |
          strip bin/godot.*
          chmod +x bin/godot.*

      - name: Build .NET solutions
        if: matrix.should_run == true && matrix.build-mono
        run: |
          dotnet --info
          ./modules/mono/build_scripts/build_assemblies.py --godot-output-dir=./bin --godot-platform=linuxbsd --werror

      - name: Upload artifact
        if: ${{ matrix.should_run == true && ((matrix.target == 'editor' && ((matrix['build-mono'] == true && (inputs.run_editor_mono == 'true' || inputs.run_editor_mono == true)) || (matrix['build-mono'] != true && (inputs.run_editor == 'true' || inputs.run_editor == true)))) || (matrix.target != 'editor' && ((matrix['build-mono'] == true && (inputs.run_template_mono == 'true' || inputs.run_template_mono == true)) || (matrix['build-mono'] != true && (inputs.run_template == 'true' || inputs.run_template == true)))) ) }}
        uses: actions/upload-artifact@v7
        with:
          name: linux-${{ matrix.target }}-${{ matrix.scons-flags }}-${{ inputs.lto }}${{ matrix.build-mono && '-mono' || '' }}
          path: bin
