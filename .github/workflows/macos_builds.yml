name: 🍎 macOS Builds
on:
  workflow_call:
    inputs:
      base-branch:
        description: 'Base branch to use for the builds'
        type: string
      lto:
        description: 'LTO mode. Options: "none", "thin", "full"'
        type: string
      repo:
        description: 'Repository to use for the build'
        type: string
      tag:
        description: 'tag to use for the build'
        type: string
      module_flags:
        description: 'Extra module flags, e.g. module_webm_enabled=no'
        type: string
      template_module_flags:
        description: 'Extra module flags for template build, e.g. module_webm_enabled=no'
        type: string
      encryption_key:
        description: 'Optional encryption key to apply to template builds'
        type: string
        default: ''
      run_editor:
        description: 'Run editor builds'
        type: boolean
        default: true
      run_editor_mono:
        description: 'Run editor mono builds'
        type: boolean
        default: false
      run_template:
        description: 'Run template builds'
        type: boolean
        default: true
      run_template_mono:
        description: 'Run template mono builds'
        type: boolean
        default: false

# Global Settings
env:
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  # Used for the cache key. Add version suffix to force clean build.
  GODOT_BASE_BRANCH: ${{ inputs.base-branch }}
  SCONSFLAGS: verbose=yes warnings=extra werror=yes strict_checks=yes debug_symbols=no use_static_cpp=yes "accesskit_sdk_path=${{ github.workspace }}/accesskit-c-0.18.0/"

jobs:
  build-macos:
    runs-on: macos-latest
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Editor (target=editor)
            target: editor
            build-mono: false
            scons-mono-flags: ''

          - name: Template (target=template_release)
            target: template_release
            build-mono: false
            scons-mono-flags: ''
          
          - name: Template (target=template_debug)
            target: template_debug
            build-mono: false
            scons-mono-flags: ''

          - name: Editor Mono (target=editor)
            target: editor
            build-mono: true
            scons-mono-flags: module_mono_enabled=yes mono_glue=yes mono_static=yes

          - name: Template Mono (target=template_release)
            target: template_release
            build-mono: true
            scons-mono-flags: module_mono_enabled=yes mono_glue=yes mono_static=yes

          - name: Template Mono (target=template_debug)
            target: template_debug
            build-mono: true
            scons-mono-flags: module_mono_enabled=yes mono_glue=yes mono_static=yes

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          repository: ${{ inputs.repo }}
          ref: ${{ inputs.tag }}
          submodules: recursive

      - name: Setup Node.js 24 (for tools/actions)
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Select Xcode 26
        run: sudo xcode-select -s /Applications/Xcode_26.0.1.app

      - name: Checkout builder scripts (Vulkan, purge_cache, etc.)
        uses: actions/checkout@v6
        with:
          repository: appsinacup/action_godot_builder
          path: builder_repo
          fetch-depth: 1

      - name: Download pre-built AccessKit
        uses: dsaltares/fetch-gh-release-asset@1.1.2
        with:
          repo: AccessKit/accesskit-c
          version: tags/0.18.0
          file: accesskit-c-0.18.0.zip
          target: accesskit-c-0.18.0/accesskit_c.zip

      - name: Extract pre-built AccessKit
        run: unzip -o accesskit-c-0.18.0/accesskit_c.zip

      - name: Restore Godot build cache
        uses: ./.github/actions/godot-cache-restore
        with:
              cache-name: v2-macos-${{ matrix.target }}-${{ matrix.scons-mono-flags }}-${{ inputs.lto }}      
        continue-on-error: true

      - name: Setup Python and SCons
        uses: ./.github/actions/godot-deps

      - name: Mask encryption key
        if: ${{ inputs.encryption_key != '' && matrix.target != 'editor' && ((matrix['build-mono'] == true && inputs.run_template_mono == true) || (matrix['build-mono'] != true && inputs.run_template == true)) }}
        run: echo "::add-mask::${{ inputs.encryption_key }}"

      - name: Export encryption key for template builds
        if: ${{ inputs.encryption_key != '' && matrix.target != 'editor' && ((matrix['build-mono'] == true && inputs.run_template_mono == true) || (matrix['build-mono'] != true && inputs.run_template == true)) }}
        run: echo "ENCRYPTION_KEY=${{ inputs.encryption_key }}" >> $GITHUB_ENV

      - name: Install Mono toolchain
        if: matrix.build-mono
        run: |
            if ! command -v brew >/dev/null 2>&1; then
            echo "Homebrew not found on runner — aborting install"
            exit 1
            fi
            brew update --quiet || true
            if ! brew list mono >/dev/null 2>&1; then
            echo "Installing mono..."
            brew install mono
            fi

      - name: Setup .NET SDK
        if: matrix.build-mono
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '6.0.x'

      - name: Setup Vulkan SDK
        run: |
          sh builder_repo/install_vulkan_sdk_macos.sh

      - name: Mono tools build (pre-glue)
        if: ${{ matrix.build-mono && ((matrix.target == 'editor' && inputs.run_editor_mono == true) || (matrix.target != 'editor' && inputs.run_template_mono == true)) }}
        uses: ./.github/actions/godot-build
        with:
          scons-flags: ${{ env.SCONSFLAGS }} arch=x86_64 ${{ contains(inputs.template_module_flags, 'lto=') && '' || inputs.lto }} ${{ inputs.module_flags }} module_mono_enabled=yes mono_glue=no
          platform: macos
          target: editor

      - name: Generate C# glue
        if: ${{ matrix.build-mono && ((matrix.target == 'editor' && inputs.run_editor_mono == true) || (matrix.target != 'editor' && inputs.run_template_mono == true)) }}
        run: ./bin/godot.macos.editor.x86_64.mono --headless --generate-mono-glue ./modules/mono/glue

      - name: Compilation (x86_64 editor)
        if: ${{ matrix.target == 'editor' && ((matrix['build-mono'] == true && inputs.run_editor_mono == true) || (matrix['build-mono'] != true && inputs.run_editor == true)) }}
        uses: ./.github/actions/godot-build
        with:
          scons-flags: ${{ env.SCONSFLAGS }} arch=x86_64 ${{ contains(inputs.template_module_flags, 'lto=') && '' || inputs.lto }} ${{ inputs.module_flags }} ${{ matrix.scons-mono-flags }}
          platform: macos
          target: ${{ matrix.target }}

      - name: Compilation (arm64 editor)
        if: ${{ matrix.target == 'editor' && ((matrix['build-mono'] == true && inputs.run_editor_mono == true) || (matrix['build-mono'] != true && inputs.run_editor == true)) }}
        uses: ./.github/actions/godot-build
        with:
          scons-flags: ${{ env.SCONSFLAGS }} arch=arm64 ${{ contains(inputs.template_module_flags, 'lto=') && '' || inputs.lto }} ${{ inputs.module_flags }} ${{ matrix.scons-mono-flags }}
          platform: macos
          target: ${{ matrix.target }}

      - name: Compilation (x86_64 template)
        if: ${{ matrix.target != 'editor' && ((matrix['build-mono'] == true && inputs.run_template_mono == true) || (matrix['build-mono'] != true && inputs.run_template == true)) }}
        uses: ./.github/actions/godot-build
        env:
          SCRIPT_AES256_ENCRYPTION_KEY: ${{ inputs.encryption_key }}
        with:
          scons-flags: ${{ env.SCONSFLAGS }} arch=x86_64 ${{ contains(inputs.template_module_flags, 'lto=') && '' || inputs.lto }} ${{ inputs.template_module_flags }} ${{ matrix.scons-mono-flags }}
          platform: macos
          target: ${{ matrix.target }}

      - name: Compilation (arm64 template)
        if: ${{ matrix.target != 'editor' && ((matrix['build-mono'] == true && inputs.run_template_mono == true) || (matrix['build-mono'] != true && inputs.run_template == true)) }}
        uses: ./.github/actions/godot-build
        env:
          SCRIPT_AES256_ENCRYPTION_KEY: ${{ inputs.encryption_key }}
        with:
          scons-flags: ${{ env.SCONSFLAGS }} arch=arm64 ${{ contains(inputs.template_module_flags, 'lto=') && '' || inputs.lto }} ${{ inputs.template_module_flags }} ${{ matrix.scons-mono-flags }}
          platform: macos
          target: ${{ matrix.target }}

      - name: Save Godot build cache
        uses: ./.github/actions/godot-cache-save
        with:
          cache-name: v2-macos-${{ matrix.target }}-${{ matrix.scons-mono-flags }}-${{ inputs.lto }}
        continue-on-error: true

      - name: Build .NET solutions
        if: matrix.build-mono
        run: |
          dotnet --info
          ./modules/mono/build_scripts/build_assemblies.py --godot-output-dir=./bin --godot-platform=macos --werror

      - name: Prepare artifact
        run: |
          mono_suffix=""
          if [ "${{ matrix.build-mono }}" = 'true' ]; then
            mono_suffix=".mono"
          fi
          x86="./bin/godot.macos.${{ matrix.target }}.x86_64${mono_suffix}"
          arm="./bin/godot.macos.${{ matrix.target }}.arm64${mono_suffix}"
          out="./bin/godot.macos.${{ matrix.target }}${mono_suffix}.universal"
          if [ -f "$x86" ] && [ -f "$arm" ]; then
            lipo -create "$x86" "$arm" -output "$out"
          elif [ -f "$x86" ]; then
            cp "$x86" "$out"
          elif [ -f "$arm" ]; then
            cp "$arm" "$out"
          else
            echo "Warning: no binaries produced for ${matrix.target}${mono_suffix}"
          fi
          strip bin/godot.* || true
          chmod +x bin/godot.* || true

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: macos-${{ matrix.target }}${{ matrix.scons-mono-flags }}-${{ inputs.lto }}
          path: bin
