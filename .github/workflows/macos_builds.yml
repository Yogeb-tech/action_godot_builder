name: 🍎 macOS Builds
on:
  workflow_call:
    inputs:
      base-branch:
        description: "Base branch to use for the builds"
        type: string
      lto:
        description: 'LTO mode. Options: "none", "thin", "full"'
        type: string
      repo:
        description: "Repository to use for the build"
        type: string
      tag:
        description: "tag to use for the build"
        type: string
      module_flags:
        description: "Extra module flags, e.g. module_webm_enabled=no"
        type: string
      template_module_flags:
        description: "Extra module flags for template build, e.g. module_webm_enabled=no"
        type: string
      encryption_key:
        description: "Optional encryption key to apply to template builds"
        type: string
        default: ""
      run_editor:
        description: "Run editor builds"
        type: boolean
        default: true
      run_editor_mono:
        description: "Run editor mono builds"
        type: boolean
        default: false
      run_template:
        description: "Run template builds"
        type: boolean
        default: true
      run_template_mono:
        description: "Run template mono builds"
        type: boolean
        default: false

# Global Settings
env:
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  GODOT_BASE_BRANCH: ${{ inputs.base-branch }}
  # Removed hardcoded accesskit_sdk_path
  SCONSFLAGS: verbose=yes warnings=extra werror=yes strict_checks=yes debug_symbols=no use_static_cpp=yes

jobs:
  build-macos:
    runs-on: macos-latest
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Editor (target=editor)
            target: editor
            build-mono: false
            scons-mono-flags: ""
            should_run: ${{ inputs.run_editor }}

          - name: Template (target=template_release)
            target: template_release
            build-mono: false
            scons-mono-flags: ""
            should_run: ${{ inputs.run_template }}

          - name: Template (target=template_debug)
            target: template_debug
            build-mono: false
            scons-mono-flags: ""
            should_run: ${{ inputs.run_template }}

          - name: Editor Mono (target=editor)
            target: editor
            build-mono: true
            scons-mono-flags: module_mono_enabled=yes mono_glue=yes mono_static=yes
            should_run: ${{ inputs.run_editor_mono }}

          - name: Template Mono (target=template_release)
            target: template_release
            build-mono: true
            scons-mono-flags: module_mono_enabled=yes mono_glue=yes mono_static=yes
            should_run: ${{ inputs.run_template_mono }}

          - name: Template Mono (target=template_debug)
            target: template_debug
            build-mono: true
            scons-mono-flags: module_mono_enabled=yes mono_glue=yes mono_static=yes
            should_run: ${{ inputs.run_template_mono }}

    steps:
      - name: Check if build target is enabled
        if: matrix.should_run != true
        shell: pwsh
        run: |
          Write-Host "This build target (${{ matrix.name }}) has been disabled via runner inputs."
          Write-Host "Exiting step sequence cleanly without processing standard dependencies."
          exit 0

      - name: Checkout
        if: matrix.should_run == true
        uses: actions/checkout@v6
        with:
          repository: ${{ inputs.repo }}
          ref: ${{ inputs.tag }}
          submodules: recursive

      - name: Setup Node.js 24 (for tools/actions)
        if: matrix.should_run == true
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Select Xcode 26
        if: matrix.should_run == true
        run: sudo xcode-select -s /Applications/Xcode_26.0.1.app

      - name: Checkout builder scripts (Vulkan, purge_cache, etc.)
        if: matrix.should_run == true
        uses: actions/checkout@v6
        with:
          repository: appsinacup/action_godot_builder
          path: builder_repo
          fetch-depth: 1

      # Hybrid AccessKit detection
      - name: Download and Extract pre-built AccessKit (4.7+)
        if: matrix.should_run == true
        shell: bash
        id: accesskit-sdk
        run: |
          if python ./misc/scripts/install_accesskit.py; then
            echo "ACCESSKIT_ENABLED=yes" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::AccessKit SDK installation failed or script not found, falling back to hardcoded path (4.6)."
            echo "ACCESSKIT_ENABLED=no" >> "$GITHUB_OUTPUT"
          fi

      - name: Restore Godot build cache
        if: matrix.should_run == true
        uses: ./.github/actions/godot-cache-restore
        with:
          cache-name: v2-macos-${{ matrix.target }}-${{ matrix.scons-mono-flags }}-${{ inputs.lto }}
        continue-on-error: true

      - name: Setup Python and SCons
        if: matrix.should_run == true
        uses: ./.github/actions/godot-deps

      - name: Map encryption key to step env and validate
        if: ${{ matrix.should_run == true && (inputs.encryption_key != '' && matrix.target != 'editor' && ((matrix['build-mono'] == true && (inputs.run_template_mono == 'true' || inputs.run_template_mono == true)) || (matrix['build-mono'] != true && (inputs.run_template == 'true' || inputs.run_template == true)))) }}
        env:
          ENCRYPTION_KEY_INPUT: ${{ inputs.encryption_key }}
        shell: sh
        run: |
          if echo "$ENCRYPTION_KEY_INPUT" | grep -Eq '[;&|<>`$]'; then
            echo 'encryption_key contains unsafe characters' >&2
            exit 1
          fi
          echo "ENCRYPTION_KEY=$ENCRYPTION_KEY_INPUT" >> $GITHUB_ENV

      - name: Mask encryption key
        if: ${{ matrix.should_run == true && (inputs.encryption_key != '' && matrix.target != 'editor' && ((matrix['build-mono'] == true && (inputs.run_template_mono == 'true' || inputs.run_template_mono == true)) || (matrix['build-mono'] != true && (inputs.run_template == 'true' || inputs.run_template == true)))) }}
        run: echo "::add-mask::$ENCRYPTION_KEY"
        shell: sh

      - name: Install Mono toolchain
        if: matrix.should_run == true && matrix.build-mono
        run: |
          if ! command -v brew >/dev/null 2>&1; then
          echo "Homebrew not found on runner — aborting install"
          exit 1
          fi
          brew update --quiet || true
          if ! brew list mono >/dev/null 2>&1; then
          echo "Installing mono..."
          brew install mono
          fi

      - name: Setup .NET SDK
        if: matrix.should_run == true && matrix.build-mono
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ contains(inputs.base-branch, '4.7') || contains(inputs.base-branch, 'master') && '8.0.x' || '6.0.x' }}

      - name: Setup Vulkan SDK
        if: matrix.should_run == true
        run: |
          sh misc/scripts/install_vulkan_sdk_macos.sh

      - name: Mono tools build (pre-glue)
        if: ${{ matrix.should_run == true && (matrix.build-mono && ((matrix.target == 'editor' && (inputs.run_editor_mono == 'true' || inputs.run_editor_mono == true)) || (matrix.target != 'editor' && (inputs.run_template_mono == 'true' || inputs.run_template_mono == true)))) }}
        uses: ./.github/actions/godot-build
        with:
          scons-flags: ${{ env.SCONSFLAGS }} arch=x86_64 ${{ contains(inputs.template_module_flags, 'lto=') && '' || inputs.lto }} ${{ inputs.module_flags }} module_mono_enabled=yes mono_glue=no ${{ steps.accesskit-sdk.outputs.ACCESSKIT_ENABLED == 'yes' && 'accesskit=yes' || format('accesskit_sdk_path={0}/accesskit-c-0.21.2/', github.workspace) }}
          platform: macos
          target: editor

      - name: Generate C# glue
        if: ${{ matrix.should_run == true && (matrix.build-mono && ((matrix.target == 'editor' && (inputs.run_editor_mono == 'true' || inputs.run_editor_mono == true)) || (matrix.target != 'editor' && (inputs.run_template_mono == 'true' || inputs.run_template_mono == true)))) }}
        run: ./bin/godot.macos.editor.x86_64.mono --headless --generate-mono-glue ./modules/mono/glue

      - name: Compilation (x86_64 editor)
        if: ${{ matrix.should_run == true && (matrix.target == 'editor' && ((matrix['build-mono'] == true && (inputs.run_editor_mono == 'true' || inputs.run_editor_mono == true)) || (matrix['build-mono'] != true && (inputs.run_editor == 'true' || inputs.run_editor == true)))) }}
        uses: ./.github/actions/godot-build
        with:
          scons-flags: ${{ env.SCONSFLAGS }} arch=x86_64 ${{ contains(inputs.template_module_flags, 'lto=') && '' || inputs.lto }} ${{ inputs.module_flags }} ${{ matrix.scons-mono-flags }} ${{ steps.accesskit-sdk.outputs.ACCESSKIT_ENABLED == 'yes' && 'accesskit=yes' || format('accesskit_sdk_path={0}/accesskit-c-0.21.2/', github.workspace) }}
          platform: macos
          target: ${{ matrix.target }}

      - name: Compilation (arm64 editor)
        if: ${{ matrix.should_run == true && (matrix.target == 'editor' && ((matrix['build-mono'] == true && (inputs.run_editor_mono == 'true' || inputs.run_editor_mono == true)) || (matrix['build-mono'] != true && (inputs.run_editor == 'true' || inputs.run_editor == true)))) }}
        uses: ./.github/actions/godot-build
        with:
          scons-flags: ${{ env.SCONSFLAGS }} arch=arm64 ${{ contains(inputs.template_module_flags, 'lto=') && '' || inputs.lto }} ${{ inputs.module_flags }} ${{ matrix.scons-mono-flags }} ${{ steps.accesskit-sdk.outputs.ACCESSKIT_ENABLED == 'yes' && 'accesskit=yes' || format('accesskit_sdk_path={0}/accesskit-c-0.21.2/', github.workspace) }}
          platform: macos
          target: ${{ matrix.target }}

      - name: Compilation (x86_64 template)
        if: ${{ matrix.should_run == true && (matrix.target != 'editor' && ((matrix['build-mono'] == true && (inputs.run_template_mono == 'true' || inputs.run_template_mono == true)) || (matrix['build-mono'] != true && (inputs.run_template == 'true' || inputs.run_template == true)))) }}
        uses: ./.github/actions/godot-build
        env:
          SCRIPT_AES256_ENCRYPTION_KEY: ${{ inputs.encryption_key }}
        with:
          scons-flags: ${{ env.SCONSFLAGS }} arch=x86_64 ${{ contains(inputs.template_module_flags, 'lto=') && '' || inputs.lto }} ${{ inputs.template_module_flags }} ${{ matrix.scons-mono-flags }} ${{ steps.accesskit-sdk.outputs.ACCESSKIT_ENABLED == 'yes' && 'accesskit=yes' || format('accesskit_sdk_path={0}/accesskit-c-0.21.2/', github.workspace) }}
          platform: macos
          target: ${{ matrix.target }}

      - name: Compilation (arm64 template)
        if: ${{ matrix.should_run == true && (matrix.target != 'editor' && ((matrix['build-mono'] == true && (inputs.run_template_mono == 'true' || inputs.run_template_mono == true)) || (matrix['build-mono'] != true && (inputs.run_template == 'true' || inputs.run_template == true)))) }}
        uses: ./.github/actions/godot-build
        env:
          SCRIPT_AES256_ENCRYPTION_KEY: ${{ inputs.encryption_key }}
        with:
          scons-flags: ${{ env.SCONSFLAGS }} arch=arm64 ${{ contains(inputs.template_module_flags, 'lto=') && '' || inputs.lto }} ${{ inputs.template_module_flags }} ${{ matrix.scons-mono-flags }} ${{ steps.accesskit-sdk.outputs.ACCESSKIT_ENABLED == 'yes' && 'accesskit=yes' || format('accesskit_sdk_path={0}/accesskit-c-0.21.2/', github.workspace) }}
          platform: macos
          target: ${{ matrix.target }}

      - name: Save Godot build cache
        if: matrix.should_run == true
        uses: ./.github/actions/godot-cache-save
        with:
          cache-name: v2-macos-${{ matrix.target }}-${{ matrix.scons-mono-flags }}-${{ inputs.lto }}
        continue-on-error: true

      - name: Build .NET solutions
        if: matrix.should_run == true && matrix.build-mono
        run: |
          dotnet --info
          ./modules/mono/build_scripts/build_assemblies.py --godot-output-dir=./bin --godot-platform=macos --werror

      - name: Prepare artifact
        if: matrix.should_run == true
        run: |
          mono_suffix=""
          if [ "${{ matrix.build-mono }}" = 'true' ]; then
            mono_suffix=".mono"
          fi
          x86="./bin/godot.macos.${{ matrix.target }}.x86_64${mono_suffix}"
          arm="./bin/godot.macos.${{ matrix.target }}.arm64${mono_suffix}"
          out="./bin/godot.macos.${{ matrix.target }}${mono_suffix}.universal"
          if [ -f "$x86" ] && [ -f "$arm" ]; then
            lipo -create "$x86" "$arm" -output "$out"
          elif [ -f "$x86" ] && [ ! -f "$arm" ]; then
            cp "$x86" "$out"
          elif [ -f "$arm" ] && [ ! -f "$x86" ]; then
            cp "$arm" "$out"
          else
            echo "Warning: no binaries produced for ${matrix.target}${mono_suffix}"
          fi
          strip bin/godot.* || true
          chmod +x bin/godot.* || true

      - name: Upload artifact
        if: ${{ matrix.should_run == true && ((matrix.target == 'editor' && ((matrix['build-mono'] == true && (inputs.run_editor_mono == 'true' || inputs.run_editor_mono == true)) || (matrix['build-mono'] != true && (inputs.run_editor == 'true' || inputs.run_editor == true)))) || (matrix.target != 'editor' && ((matrix['build-mono'] == true && (inputs.run_template_mono == 'true' || inputs.run_template_mono == true)) || (matrix['build-mono'] != true && (inputs.run_template == 'true' || inputs.run_template == true)))) ) }}
        uses: actions/upload-artifact@v7
        with:
          name: macos-${{ matrix.target }}${{ matrix.scons-mono-flags }}-${{ inputs.lto }}
          path: bin
