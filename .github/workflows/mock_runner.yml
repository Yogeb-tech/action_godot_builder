name: Test Release Workflow
run-name: Mock Build - ${{ inputs.request_id }}
on:
  workflow_dispatch:
    inputs:
      request_id:
        description: "Unique ID for this request"
        type: string
        required: true
        default: ""
      repo:
        description: "Repository to use for the build"
        type: string
        default: "godotengine/godot"
      base-branch:
        description: "Base branch to use for the builds"
        type: string
        default: "4.6"
      tag:
        description: "tag to use for downloading the repo"
        type: string
        default: "4.6.1-stable"
      tag_release:
        description: "tag to use for releasing the build"
        type: string
        default: "4.6.1.stable"
      module_flags:
        description: "Extra module flags, e.g. module_webm_enabled=no"
        type: string
        default: ""
      template_module_flags:
        description: "Extra module flags for template build, e.g. disable_3d=yes"
        type: string
        default: ""
      encryption_key:
        description: "Optional encryption key to apply to template builds"
        type: string
        default: ""
      release_repo:
        description: "Repository to use for the release (leave empty for current repo)"
        type: string
        default: ""
      lto:
        description: 'LTO mode. Options: "none", "thin", "full"'
        type: choice
        default: "lto=thin"
        options:
          - "lto=none"
          - "lto=thin"
          - "lto=full"
      platform_type:
        description: "Comma-separated list of platforms to build (e.g. windows,web,ios,linux,macos,android)"
        type: string
        default: "windows,web,ios,linux,macos,android"
      run_editor:
        description: "Run editor builds"
        type: boolean
        default: true
      run_editor_mono:
        description: "Run editor mono builds"
        type: boolean
        default: false
      run_template:
        description: "Run template (export) builds"
        type: boolean
        default: true
      run_template_mono:
        description: "Run template mono builds"
        type: boolean
        default: false

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Map inputs to step env and validate
        env:
          BASE_BRANCH_INPUT: ${{ inputs.base-branch }}
          LTO_INPUT: ${{ inputs.lto }}
          REPO_INPUT: ${{ inputs.repo }}
          RELEASE_REPO_INPUT: ${{ inputs.release_repo }}
          TAG_INPUT: ${{ inputs.tag }}
          TAG_RELEASE_INPUT: ${{ inputs.tag_release }}
          MODULE_FLAGS_INPUT: ${{ inputs.module_flags }}
          TEMPLATE_MODULE_FLAGS_INPUT: ${{ inputs.template_module_flags }}
        shell: sh
        run: |
          # Flexible validation for template_module_flags: allow common safe chars but reject shell metacharacters
          if ! echo "$TEMPLATE_MODULE_FLAGS_INPUT" | grep -Eq '^[A-Za-z0-9_ =,./:+-]*$'; then
            echo "template_module_flags contains invalid characters" >&2
            exit 1
          fi

          # Export validated values to GITHUB_ENV for later steps
          echo "BASE_BRANCH=$BASE_BRANCH_INPUT" >> $GITHUB_ENV
          echo "LTO=$LTO_INPUT" >> $GITHUB_ENV
          echo "REPO=$REPO_INPUT" >> $GITHUB_ENV
          echo "RELEASE_REPO=$RELEASE_REPO_INPUT" >> $GITHUB_ENV
          echo "TAG=$TAG_INPUT" >> $GITHUB_ENV
          echo "TAG_RELEASE=$TAG_RELEASE_INPUT" >> $GITHUB_ENV
          echo "MODULE_FLAGS=$MODULE_FLAGS_INPUT" >> $GITHUB_ENV
          echo "TEMPLATE_MODULE_FLAGS=$TEMPLATE_MODULE_FLAGS_INPUT" >> $GITHUB_ENV

      - name: Print inputs and flags
        run: |
          {
          echo "base-branch: '$BASE_BRANCH'"
            echo "lto: '$LTO'"
            echo "repo: '$REPO'"
            echo "release_repo: '$RELEASE_REPO'"
            echo "tag: '$TAG'"
            echo "tag_release: '$TAG_RELEASE'"
            echo "module_flags: '$MODULE_FLAGS'"
            echo "template_module_flags: '$TEMPLATE_MODULE_FLAGS'"
            echo "encryption-key: '[MASKED]'"

            echo ""
            echo "SCONSFLAGS:"
            echo "${SCONSFLAGS}"
          } > debug.txt

      - name: Create build artifact
        run: |
          echo "Build info for tag: $TAG_RELEASE" > build_info.txt
          echo "LTO mode: $LTO" >> build_info.txt
          echo "Module flags: $MODULE_FLAGS" >> build_info.txt
          echo "Template flags: $TEMPLATE_MODULE_FLAGS" >> build_info.txt
          echo "Created on: $(date)" >> build_info.txt

          mkdir -p build_output
          cp debug.txt build_output/
          cp build_info.txt build_output/
          echo "This is a simulated build output" > build_output/readme.txt

          zip -r godot_build_$TAG_RELEASE.zip build_output/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: godot-build-${{ inputs.tag_release }}-${{ github.run_id }}
          path: godot_build_${{ inputs.tag_release }}.zip
          retention-days: 90

      - name: Pause before finishing
        run: |
          echo "Waiting 120 seconds..."
          sleep 120

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ inputs.request_id }}
          name: Mock Release ${{ inputs.request_id }}
          repository: ${{ inputs.release_repo || github.repository }}
          body: |
            Build from workflow run #${{ github.run_id }}
            - Repository: ${{ inputs.release_repo || inputs.repo }}
            - Base branch: ${{ inputs.base-branch }}
            - LTO: ${{ inputs.lto }}
          files: godot_build_${{ inputs.tag_release }}.zip
