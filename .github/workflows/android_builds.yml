name: 🤖 Android Builds
on:
  workflow_call:
    inputs:
      base-branch:
        description: "Base branch to use for the builds"
        type: string
      lto:
        description: 'LTO mode. Options: "none", "thin", "full"'
        type: string
      repo:
        description: "Repository to use for the build"
        type: string
      tag:
        description: "tag to use for the build"
        type: string
      module_flags:
        description: "Extra module flags, e.g. module_webm_enabled=no"
        type: string
      template_module_flags:
        description: "Extra module flags for template build, e.g. module_webm_enabled=no"
        type: string
      encryption_key:
        description: "Optional encryption key to apply to template builds"
        type: string
        default: ""
      run_editor:
        description: 'Run editor builds'
        type: boolean
        default: true
      run_editor_mono:
        description: 'Run editor mono builds'
        type: boolean
        default: false
      run_template:
        description: 'Run template builds'
        type: boolean
        default: true
      run_template_mono:
        description: 'Run template mono builds'
        type: boolean
        default: false

# Global Settings
env:
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  # Used for the cache key. Add version suffix to force clean build.
  GODOT_BASE_BRANCH: ${{ inputs.base-branch }}
  SCONSFLAGS: verbose=yes warnings=extra werror=yes debug_symbols=no strict_checks=yes swappy=yes ${{ inputs.module_flags }} use_static_cpp=yes

jobs:
  build-android:
    runs-on: ubuntu-24.04
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Templates
          - name: Template Release (target=template_release)
            target: template_release
            build-mono: false
            mono-flags: ""

          - name: Template Debug (target=template_debug)
            target: template_debug
            build-mono: false
            mono-flags: ""

          - name: Template Release Mono (target=template_release)
            target: template_release
            build-mono: true
            mono-flags: module_mono_enabled=yes mono_glue=yes mono_static=yes

          - name: Template Debug Mono (target=template_debug)
            target: template_debug
            build-mono: true
            mono-flags: module_mono_enabled=yes mono_glue=yes mono_static=yes

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          repository: ${{ inputs.repo }}
          ref: ${{ inputs.tag }}
          submodules: recursive

      - name: Setup Node.js 24 (for tools/actions)
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Restore Godot build cache
        uses: ./.github/actions/godot-cache-restore
        with:
          cache-name: android-${{ matrix.target }}-${{ inputs.lto }}${{ matrix.build-mono && '-mono' || '' }}
        continue-on-error: true
       
      - name: Setup Python and SCons
        uses: ./.github/actions/godot-deps

      - name: Map encryption key to step env and validate
        if: ${{ inputs.encryption_key != '' && matrix.target != 'editor' && ((matrix['build-mono'] == true && inputs.run_template_mono == true) || (matrix['build-mono'] != true && inputs.run_template == true)) }}
        env:
          ENCRYPTION_KEY_INPUT: ${{ inputs.encryption_key }}
        shell: sh
        run: |
          if echo "$ENCRYPTION_KEY_INPUT" | grep -Eq '[;&|<>`$]'; then
            echo 'encryption_key contains unsafe characters' >&2
            exit 1
          fi
          echo "ENCRYPTION_KEY=$ENCRYPTION_KEY_INPUT" >> $GITHUB_ENV

      - name: Mask encryption key
        if: ${{ inputs.encryption_key != '' && matrix.target != 'editor' && ((matrix['build-mono'] == true && inputs.run_template_mono == true) || (matrix['build-mono'] != true && inputs.run_template == true)) }}
        run: echo "::add-mask::$ENCRYPTION_KEY"
        shell: sh

      - name: Install Mono toolchain
        if: matrix.build-mono
        run: |
          sudo apt-get update
          sudo apt-get install -y mono-devel

      - name: Setup .NET SDK
        if: matrix.build-mono
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "6.0.x"

      - name: Install NuGet CLI
        if: matrix.build-mono
        run: |
          set -e
          mkdir -p "$HOME/.local/bin"
          curl -sSL https://dist.nuget.org/win-x86-commandline/latest/nuget.exe -o "$HOME/.local/bin/nuget.exe"
          printf '#!/usr/bin/env bash\nexec mono "$HOME/.local/bin/nuget.exe" "$@"\n' > "$HOME/.local/bin/nuget"
          chmod +x "$HOME/.local/bin/nuget" "$HOME/.local/bin/nuget.exe"
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Download pre-built Android Swappy Frame Pacing Library
        uses: dsaltares/fetch-gh-release-asset@1.1.2
        with:
          repo: godotengine/godot-swappy
          version: tags/from-source-2025-01-31
          file: godot-swappy.7z
          target: swappy/godot-swappy.7z

      - name: Extract pre-built Android Swappy Frame Pacing Library
        run: 7za x -y swappy/godot-swappy.7z -o${{github.workspace}}/thirdparty/swappy-frame-pacing

      - name: Mono tools build (pre-glue)
        if: ${{ matrix.build-mono && ((matrix.target == 'editor' && inputs.run_editor_mono == true) || (matrix.target != 'editor' && inputs.run_template_mono == true)) }}
        uses: ./.github/actions/godot-build
        with:
          scons-flags: ${{ env.SCONSFLAGS }} module_mono_enabled=yes mono_glue=no ${{ inputs.module_flags }}
          platform: linuxbsd
          target: editor

      - name: Generate C# glue
        if: ${{ matrix.build-mono && ((matrix.target == 'editor' && inputs.run_editor_mono == true) || (matrix.target != 'editor' && inputs.run_template_mono == true)) }}
        run: ./bin/godot.linuxbsd.editor.x86_64.mono --headless --generate-mono-glue ./modules/mono/glue

      - name: Compilation x86_64
        if: ${{ (matrix.target == 'editor' && ((matrix['build-mono'] == true && inputs.run_editor_mono == true) || (matrix['build-mono'] != true && inputs.run_editor == true))) || (matrix.target != 'editor' && ((matrix['build-mono'] == true && inputs.run_template_mono == true) || (matrix['build-mono'] != true && inputs.run_template == true))) }}
        uses: ./.github/actions/godot-build
        env:
          SCRIPT_AES256_ENCRYPTION_KEY: ${{ inputs.encryption_key }}
        with:
          scons-flags: ${{ env.SCONSFLAGS }} ${{ contains(inputs.template_module_flags, 'lto=') && '' || inputs.lto }} ${{ inputs.template_module_flags }} ${{ matrix.mono-flags }} arch=x86_64
          platform: android
          target: ${{ matrix.target }}

      - name: Compilation x86
        if: ${{ (matrix.target == 'editor' && ((matrix['build-mono'] == true && inputs.run_editor_mono == true) || (matrix['build-mono'] != true && inputs.run_editor == true))) || (matrix.target != 'editor' && ((matrix['build-mono'] == true && inputs.run_template_mono == true) || (matrix['build-mono'] != true && inputs.run_template == true))) }}
        uses: ./.github/actions/godot-build
        env:
          SCRIPT_AES256_ENCRYPTION_KEY: ${{ inputs.encryption_key }}
        with:
          scons-flags: ${{ env.SCONSFLAGS }} ${{ contains(inputs.template_module_flags, 'lto=') && '' || inputs.lto }} ${{ inputs.template_module_flags }} ${{ matrix.mono-flags }} arch=x86
          platform: android
          target: ${{ matrix.target }}

      - name: Compilation arm64
        if: ${{ (matrix.target == 'editor' && ((matrix['build-mono'] == true && inputs.run_editor_mono == true) || (matrix['build-mono'] != true && inputs.run_editor == true))) || (matrix.target != 'editor' && ((matrix['build-mono'] == true && inputs.run_template_mono == true) || (matrix['build-mono'] != true && inputs.run_template == true))) }}
        uses: ./.github/actions/godot-build
        env:
          SCRIPT_AES256_ENCRYPTION_KEY: ${{ inputs.encryption_key }}
        with:
          scons-flags: ${{ env.SCONSFLAGS }} ${{ contains(inputs.template_module_flags, 'lto=') && '' || inputs.lto }} ${{ inputs.template_module_flags }} ${{ matrix.mono-flags }} arch=arm64
          platform: android
          target: ${{ matrix.target }}

      - name: Compilation arm32
        if: ${{ (matrix.target == 'editor' && ((matrix['build-mono'] == true && inputs.run_editor_mono == true) || (matrix['build-mono'] != true && inputs.run_editor == true))) || (matrix.target != 'editor' && ((matrix['build-mono'] == true && inputs.run_template_mono == true) || (matrix['build-mono'] != true && inputs.run_template == true))) }}
        uses: ./.github/actions/godot-build
        env:
          SCRIPT_AES256_ENCRYPTION_KEY: ${{ inputs.encryption_key }}
        with:
          scons-flags: ${{ env.SCONSFLAGS }} ${{ contains(inputs.template_module_flags, 'lto=') && '' || inputs.lto }} ${{ inputs.template_module_flags }} ${{ matrix.mono-flags }} arch=arm32 generate_apk=yes
          platform: android
          target: ${{ matrix.target }}

      - name: Checkout builder repo (cache purge script)
        uses: actions/checkout@v6
        with:
          repository: appsinacup/action_godot_builder
          path: builder_repo
          fetch-depth: 1

      - name: Save Godot build cache
        uses: ./.github/actions/godot-cache-save
        with:
          cache-name: android-${{ matrix.target }}-${{ inputs.lto }}${{ matrix.build-mono && '-mono' || '' }}
        continue-on-error: true

      - name: Build .NET solutions
        if: matrix.build-mono
        run: |
          dotnet --info
          ./modules/mono/build_scripts/build_assemblies.py --godot-output-dir=./bin --godot-platform=android --werror

      - name: Rename Android sources for release
        if: ${{ matrix.target == 'template_release' && matrix.build-mono == false }}
        run: |
          if [ -f bin/android_source.zip ]; then
            mv bin/android_source.zip bin/android_source.release.zip
          else
            echo "Warning: bin/android_source.zip not found for release (non-mono)"
          fi

      - name: Rename Android sources for debug
        if: ${{ matrix.target == 'template_debug' && matrix.build-mono == false }}
        run: |
          if [ -f bin/android_source.zip ]; then
            mv bin/android_source.zip bin/android_source.debug.zip
          else
            echo "Warning: bin/android_source.zip not found for debug (non-mono)"
          fi

      - name: Rename Android sources for release (Mono)
        if: ${{ matrix.target == 'template_release' && matrix.build-mono == true }}
        run: |
          if [ -f bin/android_source.zip ]; then
            mv bin/android_source.zip bin/android_source.mono.release.zip
          else
            echo "Warning: bin/android_source.zip not found for release (mono)"
          fi

      - name: Rename Android sources for debug (Mono)
        if: ${{ matrix.target == 'template_debug' && matrix.build-mono == true }}
        run: |
          if [ -f bin/android_source.zip ]; then
            mv bin/android_source.zip bin/android_source.mono.debug.zip
          else
            echo "Warning: bin/android_source.zip not found for debug (mono)"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: android-${{ matrix.target }}-${{ inputs.lto }}${{ matrix.build-mono && '-mono' || '' }}
          path: bin
