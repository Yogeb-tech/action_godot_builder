name: 🤖 Android Builds
on:
  workflow_call:
    inputs:
      base-branch:
        description: "Base branch to use for the builds"
        type: string
      lto:
        description: 'LTO mode. Options: "none", "thin", "full"'
        type: string
      repo:
        description: "Repository to use for the build"
        type: string
      tag:
        description: "tag to use for the build"
        type: string
      module_flags:
        description: "Extra module flags, e.g. module_webm_enabled=no"
        type: string
      template_module_flags:
        description: "Extra module flags for template build, e.g. module_webm_enabled=no"
        type: string
      encryption_key:
        description: "Optional encryption key to apply to template builds"
        type: string
        default: ""
      run_editor:
        description: "Run editor builds"
        type: boolean
        default: true
      run_editor_mono:
        description: "Run editor mono builds"
        type: boolean
        default: false
      run_template:
        description: "Run template builds"
        type: boolean
        default: true
      run_template_mono:
        description: "Run template mono builds"
        type: boolean
        default: false

# Global Settings
env:
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  GODOT_BASE_BRANCH: ${{ inputs.base-branch }}
  SCONSFLAGS: verbose=yes warnings=extra werror=yes debug_symbols=no strict_checks=yes ${{ inputs.module_flags }}

jobs:
  build-android:
    runs-on: ubuntu-latest
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Android Template
            build-mono: false
            scons-mono-flags: ""
            should_run: ${{ inputs.run_template }}

          - name: Android Template Mono
            build-mono: true
            scons-mono-flags: module_mono_enabled=yes mono_glue=yes
            should_run: ${{ inputs.run_template_mono }}

    steps:
      - name: Check if build target is enabled
        if: matrix.should_run != true
        shell: pwsh
        run: |
          Write-Host "This build target (${{ matrix.name }}) has been disabled via runner inputs."
          Write-Host "Exiting step sequence cleanly without processing standard dependencies."
          exit 0

      - name: Checkout
        if: matrix.should_run == true
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.repo }}
          ref: ${{ inputs.tag }}
          submodules: recursive

      - name: Setup Node.js 24 (for tools/actions)
        if: matrix.should_run == true
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Setup Java 17
        if: matrix.should_run == true
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Restore Godot build cache
        if: matrix.should_run == true
        uses: ./.github/actions/godot-cache-restore
        with:
          cache-name: android-${{ matrix.scons-mono-flags }}-${{ inputs.lto }}
        continue-on-error: true

      - name: Setup Python and SCons
        if: matrix.should_run == true
        uses: ./.github/actions/godot-deps

      - name: Setup .NET SDK
        if: matrix.should_run == true && matrix.build-mono
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "6.0.x"

      # Generate Mono glue (only for mono builds)
      - name: Generate Mono Glue
        if: matrix.should_run == true && matrix.build-mono
        run: |
          scons platform=android target=editor arch=arm64 \
            ${{ env.SCONSFLAGS }} \
            ${{ contains(inputs.template_module_flags, 'lto=') && '' || inputs.lto }} \
            ${{ inputs.template_module_flags }} \
            ${{ matrix.scons-mono-flags }}

      - name: Compilation (arm64)
        if: matrix.should_run == true
        uses: ./.github/actions/godot-build
        with:
          scons-flags: ${{ env.SCONSFLAGS }} arch=arm64 ${{ contains(inputs.template_module_flags, 'lto=') && '' || inputs.lto }} ${{ inputs.template_module_flags }} ${{ matrix.scons-mono-flags }}
          platform: android
          target: template_release

      - name: Compilation (arm32)
        if: matrix.should_run == true
        uses: ./.github/actions/godot-build
        with:
          scons-flags: ${{ env.SCONSFLAGS }} arch=arm32 ${{ contains(inputs.template_module_flags, 'lto=') && '' || inputs.lto }} ${{ inputs.template_module_flags }} ${{ matrix.scons-mono-flags }}
          platform: android
          target: template_release

      - name: Save Godot build cache
        if: matrix.should_run == true
        uses: ./.github/actions/godot-cache-save
        with:
          cache-name: android-${{ matrix.scons-mono-flags }}-${{ inputs.lto }}
        continue-on-error: true

      - name: Build .NET solutions
        if: matrix.should_run == true && matrix.build-mono
        run: |
          dotnet --info
          ./modules/mono/build_scripts/build_assemblies.py --godot-output-dir=./bin --godot-platform=android --werror

      - name: Generate Android APK / Template Packages
        if: matrix.should_run == true
        run: |
          cd platform/android/java
          ./gradlew generateGodotTemplates
          cd ../../..
          ls -l bin/

      - name: Upload artifact
        if: matrix.should_run == true
        uses: actions/upload-artifact@v4
        with:
          name: android-${{ matrix.scons-mono-flags }}-${{ inputs.lto }}
          path: bin
