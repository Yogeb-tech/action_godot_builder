name: 🏁 Windows Builds
on:
  workflow_call:
    inputs:
      base-branch:
        type: string
      lto:
        type: string
      repo:
        type: string
      tag:
        type: string
      module_flags:
        type: string
      template_module_flags:
        type: string
      encryption_key:
        type: string
        default: ""
      run_editor:
        type: boolean
        default: true
      run_editor_mono:
        type: boolean
        default: false
      run_template:
        type: boolean
        default: true
      run_template_mono:
        type: boolean
        default: false

env:
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  GODOT_BASE_BRANCH: ${{ inputs.base-branch }}
  SCONSFLAGS: verbose=yes warnings=extra d3d12=yes strict_checks=yes debug_symbols=no ${{ inputs.module_flags }} use_static_cpp=yes "angle_libs=${{ github.workspace }}/" "accesskit_sdk_path=${{ github.workspace }}/accesskit-c-0.18.0/"
  SCONS_CACHE_MSVC_CONFIG: true

jobs:
  build-windows:
    runs-on: windows-latest
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Template release (x86_64)
            target: template_release
            scons-flags: arch=x86_64
            build-mono: false
            mono-flags: ""
            should_run: ${{ inputs.run_template }}

          - name: Template debug (x86_64)
            target: template_debug
            scons-flags: arch=x86_64
            build-mono: false
            mono-flags: ""
            should_run: ${{ inputs.run_template }}

          - name: Template release Mono (x86_64)
            target: template_release
            scons-flags: arch=x86_64
            build-mono: true
            mono-flags: module_mono_enabled=yes mono_glue=yes mono_static=yes
            should_run: ${{ inputs.run_template_mono }}

          - name: Template debug Mono (x86_64)
            target: template_debug
            scons-flags: arch=x86_64
            build-mono: true
            mono-flags: module_mono_enabled=yes mono_glue=yes mono_static=yes
            should_run: ${{ inputs.run_template_mono }}

          - name: Editor (x86_64)
            target: editor
            scons-flags: arch=x86_64
            build-mono: false
            mono-flags: ""
            should_run: ${{ inputs.run_editor }}

          - name: Editor Mono (x86_64)
            target: editor
            scons-flags: arch=x86_64
            build-mono: true
            mono-flags: module_mono_enabled=yes mono_glue=yes mono_static=yes
            should_run: ${{ inputs.run_editor_mono }}

    steps:
      - name: Check if build target is enabled
        if: matrix.should_run != true
        shell: pwsh
        run: |
          Write-Host "This build target (${{ matrix.name }}) has been disabled via runner inputs."
          Write-Host "Exiting step sequence cleanly without processing standard dependencies."
          exit 0

      - name: Checkout
        if: matrix.should_run == true
        uses: actions/checkout@v6
        with:
          repository: ${{ inputs.repo }}
          ref: ${{ inputs.tag }}
          submodules: recursive

      - name: Setup Node.js 24 (for tools/actions)
        if: matrix.should_run == true
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Restore Godot build cache
        if: matrix.should_run == true
        uses: ./.github/actions/godot-cache-restore
        with:
          cache-name: windows-${{ matrix.target }}${{ matrix.mono-flags }}-${{ matrix.scons-flags }}-${{ inputs.lto }}
        continue-on-error: true

      - name: Setup Python and SCons
        if: matrix.should_run == true
        uses: ./.github/actions/godot-deps

      - name: Map encryption key to step env and validate
        if: matrix.should_run == true && inputs.encryption_key != '' && matrix.target != 'editor'
        env:
          ENCRYPTION_KEY_INPUT: ${{ inputs.encryption_key }}
        shell: pwsh
        run: |
          if ($ENCRYPTION_KEY_INPUT -match '[;&|<>`$]') { Write-Error "encryption_key contains unsafe characters"; exit 1 }
          Add-Content -Path $env:GITHUB_ENV -Value "ENCRYPTION_KEY=$ENCRYPTION_KEY_INPUT"

      - name: Mask encryption key
        if: matrix.should_run == true && inputs.encryption_key != '' && matrix.target != 'editor'
        run: Write-Host "::add-mask::$env:ENCRYPTION_KEY"
        shell: pwsh

      - name: Download Direct3D 12 SDK components
        if: matrix.should_run == true
        run: python ./misc/scripts/install_d3d12_sdk_windows.py

      - name: Set D3D12 SDK path
        if: matrix.should_run == true
        run: echo "D3D12_SDK_PATH=$env:LOCALAPPDATA\Godot\build_deps" >> $env:GITHUB_ENV
        shell: pwsh

      - name: Download pre-built ANGLE static libraries (x86_64)
        if: matrix.should_run == true && matrix.scons-flags == 'arch=x86_64'
        uses: dsaltares/fetch-gh-release-asset@1.1.2
        with:
          repo: godotengine/godot-angle-static
          version: tags/chromium/6601.2
          file: godot-angle-static-x86_64-msvc-release.zip
          target: angle/angle_x86_64.zip

      - name: Extract pre-built ANGLE static libraries (x86_64)
        if: matrix.should_run == true && matrix.scons-flags == 'arch=x86_64'
        run: Expand-Archive -Force angle/angle_x86_64.zip ${{ github.workspace }}/

      - name: Download pre-built ANGLE static libraries (x86_32)
        if: matrix.should_run == true && matrix.scons-flags == 'arch=x86'
        uses: dsaltares/fetch-gh-release-asset@1.1.2
        with:
          repo: godotengine/godot-angle-static
          version: tags/chromium/6601.2
          file: godot-angle-static-x86_32-msvc-release.zip
          target: angle/angle_x86_32.zip

      - name: Extract pre-built ANGLE static libraries (x86_32)
        if: matrix.should_run == true && matrix.scons-flags == 'arch=x86'
        run: Expand-Archive -Force angle/angle_x86_32.zip ${{ github.workspace }}/

      - name: Download pre-built ANGLE static libraries (arm64)
        if: matrix.should_run == true && matrix.scons-flags == 'arch=arm64'
        uses: dsaltares/fetch-gh-release-asset@1.1.2
        with:
          repo: godotengine/godot-angle-static
          version: tags/chromium/6601.2
          file: godot-angle-static-arm64-msvc-release.zip
          target: angle/angle_arm64.zip

      - name: Extract pre-built ANGLE static libraries (arm64)
        if: matrix.should_run == true && matrix.scons-flags == 'arch=arm64'
        run: Expand-Archive -Force angle/angle_arm64.zip ${{ github.workspace }}/

      - name: Download pre-built AccessKit
        if: matrix.should_run == true
        uses: dsaltares/fetch-gh-release-asset@1.1.2
        with:
          repo: AccessKit/accesskit-c
          version: tags/0.18.0
          file: accesskit-c-0.18.0.zip
          target: accesskit-c-0.18.0/accesskit_c.zip

      - name: Extract pre-built AccessKit
        if: matrix.should_run == true
        run: unzip -o accesskit-c-0.18.0/accesskit_c.zip

      # Mono prerequisites
      - name: Setup .NET SDK
        if: matrix.should_run == true && matrix.build-mono
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "6.0.x"

      - name: Mono tools build (pre-glue)
        if: matrix.should_run == true && matrix.build-mono
        uses: ./.github/actions/godot-build
        with:
          scons-flags: arch=x86_64 module_mono_enabled=yes mono_glue=no ${{ inputs.module_flags }}
          platform: windows
          target: editor

      - name: Generate C# glue
        if: matrix.should_run == true && matrix.build-mono
        run: |
          .\bin\godot.windows.editor.x86_64.mono.exe --headless --generate-mono-glue .\modules\mono\glue

      # Compilation
      - name: Compilation (editor)
        if: matrix.should_run == true && matrix.target == 'editor'
        uses: ./.github/actions/godot-build
        env:
          D3D12_SDK_PATH: ${{ env.D3D12_SDK_PATH }}
        with:
          scons-flags: ${{ env.SCONSFLAGS }} ${{ matrix.scons-flags }} ${{ contains(inputs.template_module_flags, 'lto=') && '' || inputs.lto }} ${{ inputs.module_flags }} ${{ matrix.mono-flags }}
          platform: windows
          target: ${{ matrix.target }}

      - name: Compilation (template)
        if: matrix.should_run == true && matrix.target != 'editor'
        uses: ./.github/actions/godot-build
        env:
          D3D12_SDK_PATH: ${{ env.D3D12_SDK_PATH }}
          SCRIPT_AES256_ENCRYPTION_KEY: ${{ inputs.encryption_key }}
        with:
          scons-flags: ${{ env.SCONSFLAGS }} ${{ matrix.scons-flags }} ${{ contains(inputs.template_module_flags, 'lto=') && '' || inputs.lto }} ${{ inputs.template_module_flags }} ${{ matrix.mono-flags }}
          platform: windows
          target: ${{ matrix.target }}

      - name: Checkout builder repo (cache purge script)
        if: matrix.should_run == true
        uses: actions/checkout@v6
        with:
          repository: appsinacup/action_godot_builder
          path: builder_repo
          fetch-depth: 1

      - name: Save Godot build cache
        if: matrix.should_run == true
        uses: ./.github/actions/godot-cache-save
        with:
          cache-name: windows-${{ matrix.target }}${{ matrix.mono-flags }}-${{ matrix.scons-flags }}-${{ inputs.lto }}
        continue-on-error: true

      - name: Build .NET solutions
        if: matrix.should_run == true && matrix.build-mono
        run: |
          dotnet --info
          ./modules/mono/build_scripts/build_assemblies.py --godot-output-dir=./bin --godot-platform=windows --werror

      - name: Prepare artifact
        if: matrix.should_run == true
        run: |
          Remove-Item bin/* -Include *.exp,*.lib,*.pdb -Force

      - name: Upload artifact
        if: matrix.should_run == true
        uses: actions/upload-artifact@v7
        with:
          name: windows-${{ matrix.target }}${{ matrix.mono-flags }}-${{ matrix.scons-flags }}-${{ inputs.lto }}
          path: bin
