name: Test Release Workflow

on:
  workflow_dispatch:
    inputs:
      repo:
        description: "Repository to use for the build"
        type: string
        default: "godotengine/godot"
      base-branch:
        description: "Base branch to use for the builds"
        type: string
        default: "4.6"
      tag:
        description: "tag to use for downloading the repo"
        type: string
        default: "4.6.1-stable"
      tag_release:
        description: "tag to use for releasing the build"
        type: string
        default: "4.6.1.stable"
      module_flags:
        description: "Extra module flags, e.g. module_webm_enabled=no"
        type: string
        default: ""
      template_module_flags:
        description: "Extra module flags for template build, e.g. disable_3d=yes"
        type: string
        default: ""
      encryption_key:
        description: "Optional encryption key to apply to template builds"
        type: string
        default: ""
      release_repo:
        description: "Repository to use for the release (leave empty for current repo)"
        type: string
        default: ""
      lto:
        description: 'LTO mode. Options: "none", "thin", "full"'
        type: choice
        default: "lto=thin"
        options:
          - "lto=none"
          - "lto=thin"
          - "lto=full"
      run_editor:
        description: "Run editor builds"
        type: boolean
        default: true
      run_editor_mono:
        description: "Run editor mono builds"
        type: boolean
        default: false
      run_template:
        description: "Run template (export) builds"
        type: boolean
        default: true
      run_template_mono:
        description: "Run template mono builds"
        type: boolean
        default: false

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Print inputs and flags
        run: |
          {
          echo "base-branch: '${{ inputs.base-branch }}'"
            echo "lto: '${{ inputs.lto }}'"
            echo "repo: '${{ inputs.repo }}'"
            echo "release_repo: '${{ inputs.release_repo }}'"
            echo "tag: '${{ inputs.tag }}'"
            echo "tag_release: '${{ inputs.tag_release }}'"
            echo "module_flags: '${{ inputs.module_flags }}'"
            echo "template_module_flags: '${{ inputs.template_module_flags }}'"
            echo "encryption-key: '[MASKED]'"

            echo ""
            echo "SCONSFLAGS:"
            echo "${SCONSFLAGS}"
          } > debug.txt

      - name: Pause before finishing
        run: |
          echo "Waiting 60 seconds..."
          sleep 60
