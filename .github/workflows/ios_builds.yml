name: 🍏 iOS Builds
on:
  workflow_call:
    inputs:
      base-branch:
        description: "Base branch to use for the builds"
        type: string
      lto:
        description: 'LTO mode. Options: "none", "thin", "full"'
        type: string
      repo:
        description: "Repository to use for the build"
        type: string
      tag:
        description: "tag to use for the build"
        type: string
      module_flags:
        description: "Extra module flags, e.g. module_webm_enabled=no"
        type: string
      template_module_flags:
        description: "Extra module flags for template build, e.g. module_webm_enabled=no"
        type: string
      encryption_key:
        description: "Optional encryption key to apply to template builds"
        type: string
        default: ""
      run_editor:
        description: "Run editor builds"
        type: boolean
        default: true
      run_editor_mono:
        description: "Run editor mono builds"
        type: boolean
        default: false
      run_template:
        description: "Run template builds"
        type: boolean
        default: true
      run_template_mono:
        description: "Run template mono builds"
        type: boolean
        default: false

# Global Settings
env:
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  # Used for the cache key. Add version suffix to force clean build.
  GODOT_BASE_BRANCH: ${{ inputs.base-branch }}
  # Added CXXFLAGS to suppress C99 array designator warnings (which become errors with -Werror)
  SCONSFLAGS: verbose=yes warnings=extra werror=yes debug_symbols=no strict_checks=yes ${{ inputs.module_flags }} use_static_cpp=yes CXXFLAGS="-Wno-c99-designator"

jobs:
  build-ios:
    runs-on: macos-latest
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Template
            build-mono: false
            scons-mono-flags: ""
            should_run: ${{ inputs.run_template }}

          - name: Template Mono
            build-mono: true
            scons-mono-flags: module_mono_enabled=yes mono_glue=yes mono_static=yes
            should_run: ${{ inputs.run_template_mono }}

    steps:
      - name: Check if build target is enabled
        if: matrix.should_run != true
        shell: pwsh
        run: |
          Write-Host "This build target (${{ matrix.name }}) has been disabled via runner inputs."
          Write-Host "Exiting step sequence cleanly without processing standard dependencies."
          exit 0

      - name: Checkout
        if: matrix.should_run == true
        uses: actions/checkout@v6
        with:
          repository: ${{ inputs.repo }}
          ref: ${{ inputs.tag }}
          submodules: recursive

      - name: Setup Node.js 24 (for tools/actions)
        if: matrix.should_run == true
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Checkout builder scripts (Vulkan SDK)
        if: matrix.should_run == true
        uses: actions/checkout@v6
        with:
          repository: appsinacup/action_godot_builder
          path: builder_repo
          fetch-depth: 1

      - name: Restore Godot build cache
        if: matrix.should_run == true
        uses: ./.github/actions/godot-cache-restore
        with:
          cache-name: v2-ios-${{ matrix.scons-mono-flags }}-${{ inputs.lto }}
        continue-on-error: true

      - name: Setup Python and SCons
        if: matrix.should_run == true
        uses: ./.github/actions/godot-deps

      - name: Install Mono toolchain
        if: matrix.should_run == true && matrix.build-mono
        run: |
          if ! command -v brew >/dev/null 2>&1; then
          echo "Homebrew not found on runner — aborting install"
          exit 1
          fi
          brew update --quiet || true
          if ! brew list mono >/dev/null 2>&1; then
          echo "Installing mono..."
          brew install mono
          fi

      - name: Setup .NET SDK
        if: matrix.should_run == true && matrix.build-mono
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "6.0.x"

      - name: Setup Vulkan SDK
        if: matrix.should_run == true
        run: |
          sh misc/scripts/install_vulkan_sdk_macos.sh

      - name: Mono tools build (pre-glue)
        if: matrix.should_run == true && matrix.build-mono
        uses: ./.github/actions/godot-build
        with:
          scons-flags: ${{ env.SCONSFLAGS }} arch=x86_64 ${{ contains(inputs.template_module_flags, 'lto=') && '' || inputs.lto }} ${{ inputs.module_flags }} module_mono_enabled=yes mono_glue=no
          platform: macos
          target: editor

      - name: Generate C# glue
        if: matrix.should_run == true && matrix.build-mono
        run: ./bin/godot.macos.editor.x86_64.mono --headless --generate-mono-glue ./modules/mono/glue

      - name: Compilation Debug (arm64)
        if: matrix.should_run == true && ((matrix.build-mono == true && (inputs.run_template_mono == 'true' || inputs.run_template_mono == true)) || (matrix.build-mono != true && (inputs.run_template == 'true' || inputs.run_template == true)))
        uses: ./.github/actions/godot-build
        with:
          scons-flags: ${{ env.SCONSFLAGS }} arch=arm64 ${{ contains(inputs.template_module_flags, 'lto=') && '' || inputs.lto }} ${{ inputs.template_module_flags }} ${{ matrix.scons-mono-flags }}
          platform: ios
          target: template_debug

      - name: Compilation Release (arm64)
        if: matrix.should_run == true && ((matrix.build-mono == true && (inputs.run_template_mono == 'true' || inputs.run_template_mono == true)) || (matrix.build-mono != true && (inputs.run_template == 'true' || inputs.run_template == true)))
        uses: ./.github/actions/godot-build
        with:
          scons-flags: ${{ env.SCONSFLAGS }} arch=arm64 ${{ contains(inputs.template_module_flags, 'lto=') && '' || inputs.lto }} ${{ inputs.template_module_flags }} ${{ matrix.scons-mono-flags }} generate_bundle=yes
          platform: ios
          target: template_release

      - name: Save Godot build cache
        if: matrix.should_run == true
        uses: ./.github/actions/godot-save-cache
        with:
          cache-name: v2-ios-${{ matrix.scons-mono-flags }}-${{ inputs.lto }}
        continue-on-error: true

      - name: Build .NET solutions
        if: matrix.should_run == true && matrix.build-mono
        run: |
          dotnet --info
          ./modules/mono/build_scripts/build_assemblies.py --godot-output-dir=./bin --godot-platform=ios --werror

      - name: Rename iOS export zip for Mono (avoid artifact merge collision)
        if: matrix.should_run == true && matrix.build-mono
        run: |
          if [ -f bin/godot_ios.zip ]; then mv bin/godot_ios.zip bin/godot_ios_mono.zip; fi

      - name: Upload artifact
        if: matrix.should_run == true && ((matrix.build-mono == true && (inputs.run_template_mono == 'true' || inputs.run_template_mono == true)) || (matrix.build-mono != true && (inputs.run_template == 'true' || inputs.run_template == true)))
        uses: actions/upload-artifact@v7
        with:
          name: ios-${{ matrix.scons-mono-flags }}-${{ inputs.lto }}
          path: bin
