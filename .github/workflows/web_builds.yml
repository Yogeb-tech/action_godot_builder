name: 🌐 Web Template Builds
on:
  workflow_call:
    inputs:
      base-branch:
        description: 'Base branch to use for the builds'
        type: string
      repo:
        description: 'Repository to use for the build'
        default: 'godotengine/godot'
        type: string
      tag:
        description: 'tag to use for the build'
        type: string
      module_flags:
        description: 'Extra module flags, e.g. module_webm_enabled=no'
        type: string
      platform_flags:
        description: 'Platform-specific module flags, e.g. disable_3d=yes'
        type: string
      build_flags:
        description: 'Additional SCons flags (replaces lto), e.g. lto=thin'
        type: string

env:
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  GODOT_BASE_BRANCH: ${{ inputs.base-branch }}
  SCONSFLAGS: verbose=yes warnings=extra werror=yes debug_symbols=no optimize=size use_closure_compiler=yes strict_checks=yes ${{ inputs.module_flags }} use_static_cpp=yes
  EM_VERSION: 4.0.11

jobs:
  web-template:
    name: Web Template Builds
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          repository: ${{ inputs.repo }}
          ref: ${{ inputs.tag }}
          submodules: recursive

      - name: Set up Emscripten latest
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: ${{ env.EM_VERSION }}
          no-cache: true

      - name: Verify Emscripten setup
        run: |
          emcc -v

      - name: Restore Godot build cache
        uses: ./.github/actions/godot-cache-restore
        with:
          cache-name: web-templates-${{ inputs.platform_flags }}-${{ inputs.build_flags }}
        continue-on-error: true

      - name: Setup Python and SCons
        uses: ./.github/actions/godot-deps

      - name: Compilation (template_release)
        uses: ./.github/actions/godot-build
        with:
          scons-flags: ${{ env.SCONSFLAGS }} ${{ inputs.build_flags }} ${{ inputs.platform_flags }}
          platform: web
          target: template_release

      - name: Compilation (template_debug)
        uses: ./.github/actions/godot-build
        with:
          scons-flags: ${{ env.SCONSFLAGS }} ${{ inputs.build_flags }} ${{ inputs.platform_flags }}
          platform: web
          target: template_debug

      - name: Checkout builder repo (cache purge script)
        uses: actions/checkout@v6
        with:
          repository: appsinacup/action_godot_builder
          path: builder_repo
          fetch-depth: 1

      - name: Save Godot build cache
        uses: ./.github/actions/godot-cache-save
        with:
          cache-name: web-templates-${{ inputs.platform_flags }}-${{ inputs.build_flags }}
          purge-cache-script: builder_repo/misc/scripts/purge_cache.py
        continue-on-error: true

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: web-templates-${{ inputs.build_flags }}
          path: bin
