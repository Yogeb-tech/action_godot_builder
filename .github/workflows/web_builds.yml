name: 🌐 Web Builds
on:
  workflow_call:
    inputs:
      base-branch:
        description: "Base branch to use for the builds"
        type: string
      lto:
        description: 'LTO mode. Options: "none", "thin", "full"'
        type: string
      repo:
        description: "Repository to use for the build"
        default: "godotengine/godot"
        type: string
      tag:
        description: "tag to use for the build"
        type: string
      module_flags:
        description: "Extra module flags, e.g. module_webm_enabled=no"
        type: string
      template_module_flags:
        description: "Extra module flags for template build, e.g. threads=no"
        type: string
      encryption_key:
        description: "Optional encryption key to apply to template builds"
        type: string
        default: ""
      run_editor:
        description: "Run editor builds"
        type: boolean
        default: true
      run_editor_mono:
        description: "Run editor mono builds"
        type: boolean
        default: false
      run_template:
        description: "Run template builds"
        type: boolean
        default: true
      run_template_mono:
        description: "Run template mono builds"
        type: boolean
        default: false

# Global Settings
env:
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  # Used for the cache key. Add version suffix to force clean build.
  GODOT_BASE_BRANCH: ${{ inputs.base-branch }}
  SCONSFLAGS: verbose=yes warnings=extra werror=yes debug_symbols=no optimize=size use_closure_compiler=yes strict_checks=yes ${{ inputs.module_flags }} use_static_cpp=yes
  EM_VERSION: 4.0.11

jobs:
  web-template:
    runs-on: ubuntu-24.04
    name: ${{ matrix.name }}
    # Only run this job if template builds are requested (non-mono templates)
    if: ${{ inputs.run_template == true }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Template (target=template_release)
            target: template_release
            scons-flags: ''

          - name: Template (target=template_debug)
            target: template_debug
            scons-flags: ''

          - name: Template (target=template_release, dlink_enabled=yes)
            target: template_release
            scons-flags: ''

          - name: Template (target=template_debug, dlink_enabled=yes)
            target: template_debug
            scons-flags: ''
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          repository: ${{ inputs.repo }}
          ref: ${{ inputs.tag }}
          submodules: recursive

      - name: Setup Node.js 24 (for tools/actions)
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Set up Emscripten latest
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: ${{ env.EM_VERSION }}
          no-cache: true

      - name: Verify Emscripten setup
        run: |
          emcc -v

      - name: Restore Godot build cache
        uses: ./.github/actions/godot-cache-restore
        with:
          cache-name: web-${{ matrix.target }}-${{ matrix.scons-flags }}-${{ inputs.lto }}
        continue-on-error: true

      - name: Setup Python and SCons
        uses: ./.github/actions/godot-deps

      - name: Map encryption key to step env and validate
        if: ${{ inputs.encryption_key != '' }}
        env:
          ENCRYPTION_KEY_INPUT: ${{ inputs.encryption_key }}
        shell: sh
        run: |
          if echo "$ENCRYPTION_KEY_INPUT" | grep -Eq '[;&|<>`$]'; then
            echo 'encryption_key contains unsafe characters' >&2
            exit 1
          fi
          echo "ENCRYPTION_KEY=$ENCRYPTION_KEY_INPUT" >> $GITHUB_ENV

      - name: Mask encryption key
        run: echo "::add-mask::$ENCRYPTION_KEY"
        shell: sh

      - name: Compilation
        uses: ./.github/actions/godot-build
        env:
          SCRIPT_AES256_ENCRYPTION_KEY: ${{ inputs.encryption_key }}
        with:
          # Inputs.template_module_flags is placed at the end so it overrides previous flags
          scons-flags: ${{ env.SCONSFLAGS }} ${{ matrix.scons-flags }} ${{ contains(inputs.template_module_flags, 'lto=') && '' || inputs.lto }} ${{ inputs.template_module_flags }}
          platform: web
          target: ${{ matrix.target }}

      - name: Checkout builder repo (cache purge script)
        uses: actions/checkout@v6
        with:
          repository: appsinacup/action_godot_builder
          path: builder_repo
          fetch-depth: 1

      - name: Save Godot build cache
        uses: ./.github/actions/godot-cache-save
        with:
          cache-name: web-${{ matrix.target }}-${{ matrix.scons-flags }}-${{ inputs.lto }}
        continue-on-error: true

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: web-${{ matrix.target }}-${{ matrix.scons-flags }}-${{ inputs.lto }}
          path: bin