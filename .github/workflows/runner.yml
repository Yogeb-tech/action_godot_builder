name: 🔗 GHA
on:
  workflow_dispatch:
    inputs:
      repo:
        description: 'Repository to use for the build'
        type: string
        default: 'godotengine/godot'
      base-branch:
        description: 'Base branch to use for the builds'
        type: string
        default: '4.6'
      tag:
        description: 'tag to use for downloading the repo'
        type: string
        default: '4.6.1-stable'
      tag_release:
        description: 'tag to use for releasing the build'
        type: string
        default: '4.6.1.stable'
      module_flags:
        description: 'Extra module flags, e.g. module_webm_enabled=no'
        type: string
        default: ''
      platform_flags:
        description: 'Platform-specific module flags, e.g. disable_3d=yes'
        type: string
        default: ''
      build_flags:
        description: 'Additional SCons flags (replaces lto), e.g. lto=thin'
        type: string
        default: ''

jobs:
  android-build:
    name: 🤖 Android
    uses: ./.github/workflows/android_builds.yml
    with:
      repo: ${{ inputs.repo }}
      tag: ${{ inputs.tag }}
      module_flags: ${{ inputs.module_flags }}
      platform_flags: ${{ inputs.platform_flags }}
      build_flags: ${{ inputs.build_flags }}
    secrets: inherit

  ios-build:
    name: 🍏 iOS
    uses: ./.github/workflows/ios_builds.yml
    with:
      repo: ${{ inputs.repo }}
      tag: ${{ inputs.tag }}
      module_flags: ${{ inputs.module_flags }}
      platform_flags: ${{ inputs.platform_flags }}
      build_flags: ${{ inputs.build_flags }}
    secrets: inherit

  linux-build:
    name: 🐧 Linux
    uses: ./.github/workflows/linux_builds.yml
    with:
      repo: ${{ inputs.repo }}
      tag: ${{ inputs.tag }}
      module_flags: ${{ inputs.module_flags }}
      platform_flags: ${{ inputs.platform_flags }}
      build_flags: ${{ inputs.build_flags }}
    secrets: inherit
  
  macos-build:
    name: 🍎 macOS
    uses: ./.github/workflows/macos_builds.yml
    with:
      repo: ${{ inputs.repo }}
      tag: ${{ inputs.tag }}
      module_flags: ${{ inputs.module_flags }}
      platform_flags: ${{ inputs.platform_flags }}
      build_flags: ${{ inputs.build_flags }}
    secrets: inherit

  windows-build:
    name: 🏁 Windows
    uses: ./.github/workflows/windows_builds.yml
    with:
      repo: ${{ inputs.repo }}
      tag: ${{ inputs.tag }}
      module_flags: ${{ inputs.module_flags }}
      platform_flags: ${{ inputs.platform_flags }}
      build_flags: ${{ inputs.build_flags }}
    secrets: inherit

  web-build:
    name: 🌐 Web
    uses: ./.github/workflows/web_builds.yml
    with:
      repo: ${{ inputs.repo }}
      tag: ${{ inputs.tag }}
      module_flags: ${{ inputs.module_flags }}
      platform_flags: ${{ inputs.platform_flags }}
      build_flags: ${{ inputs.build_flags }}
    secrets: inherit

  release:
    name: 🚀 Create Release
    permissions:
      contents: write
      actions: read
      packages: write
    needs:
      - android-build
      - ios-build
      - linux-build
      - macos-build
      - windows-build
      - web-build
    uses: ./.github/workflows/release.yml
    with:
      base-branch: ${{ inputs.base-branch }}
      repo: ${{ inputs.repo }}
      tag: ${{ inputs.tag }}
      tag_release: ${{ inputs.tag_release }}
      module_flags: ${{ inputs.module_flags }}
      platform_flags: ${{ inputs.platform_flags }}
      build_flags: ${{ inputs.build_flags }}
      release_repo: ${{ inputs.release_repo }}
    secrets: inherit
