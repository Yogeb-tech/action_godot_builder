name: Setup Python and SCons
description: Setup Python, install the pip version of SCons.

inputs:
  python-version:
    description: The Python version to use.
    default: 3.x
  python-arch:
    description: The Python architecture.
    default: x64
  scons-version:
    description: The SCons version to use.
    default: 4.9.0

runs:
  using: composite
  steps:
    - name: Map inputs to intermediate env vars and validate
      env:
        SCONS_VERSION_INPUT: ${{ inputs.scons-version }}
      shell: bash
      run: |
        # Validate scons version and export to GITHUB_ENV without directly interpolating inputs in the script
        if ! echo "$SCONS_VERSION_INPUT" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+'; then
          echo "Invalid scons-version: $SCONS_VERSION_INPUT" >&2
          exit 1
        fi
        echo "SCONS_VERSION=$SCONS_VERSION_INPUT" >> $GITHUB_ENV

    - name: Set up Python 3.x
      uses: actions/setup-python@v6
      with:
        # Semantic version range syntax or exact version of a Python version.
        python-version: ${{ inputs.python-version }}
        # Optional - x64 or x86 architecture, defaults to x64.
        architecture: ${{ inputs.python-arch }}

    - name: Setup SCons
      shell: bash
      run: |
        python -c "import sys; print(sys.version)"
        python -m pip install "scons==${SCONS_VERSION}"
        scons --version

    - name: Setup problem matchers
      shell: bash
      run: echo ::add-matcher::misc/utility/problem-matchers.json
