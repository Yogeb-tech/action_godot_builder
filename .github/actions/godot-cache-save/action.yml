name: Save Godot build cache
description: Save Godot build cache.
inputs:
  cache-name:
    description: The cache base name (job name by default).
    default: ${{ github.job }}
  scons-cache:
    description: The SCons cache path.
    default: ${{ github.workspace }}/.scons_cache/
  purge-cache-script:
    description: Path to purge_cache.py
    required: false
    default: misc/scripts/purge_cache.py

runs:
  using: composite
  steps:
    - name: Map inputs to intermediate env vars and validate
      env:
        PURGE_CACHE_SCRIPT_INPUT: ${{ inputs.purge-cache-script }}
        SCONS_CACHE_INPUT: ${{ inputs.scons-cache }}
      shell: sh
      run: |
        # Validation: ensure purge script path is repo-relative and doesn't include .. or strange chars
        if ! echo "$PURGE_CACHE_SCRIPT_INPUT" | grep -Eq '^[A-Za-z0-9_./\\-]+$'; then
          echo "Invalid purge-cache-script path: $PURGE_CACHE_SCRIPT_INPUT" >&2
          exit 1
        fi
        echo "PURGE_CACHE_SCRIPT=$PURGE_CACHE_SCRIPT_INPUT" >> $GITHUB_ENV
        echo "SCONS_CACHE=$SCONS_CACHE_INPUT" >> $GITHUB_ENV

    - name: Ensure purge timestamp is set
      shell: sh
      run: |
        if [ -z "$CACHE_TIMESTAMP" ]; then
          FALLBACK_TIME=$(($(date +%s) - 3600))
          echo "CACHE_TIMESTAMP=$FALLBACK_TIME" >> $GITHUB_ENV
          echo "CACHE_TIMESTAMP was empty — using fallback (1 hour ago)"
        else
          echo "Using existing CACHE_TIMESTAMP: $CACHE_TIMESTAMP"
        fi

    - name: Purge files before timestamp
      shell: sh
      run: python3 "$PURGE_CACHE_SCRIPT" "$CACHE_TIMESTAMP" "$SCONS_CACHE"

    - name: Check existing cache (lookup only)
      uses: actions/cache/restore@v5
      id: cache-check
      with:
        path: ${{ inputs.scons-cache }}
        key: ${{ inputs.cache-name }}|${{ github.ref_name }}
        lookup-only: true

    - name: Save SCons cache directory
      if: steps.cache-check.outputs.cache-matched-key == ''
      uses: actions/cache/save@v5
      with:
        path: ${{ inputs.scons-cache }}
        key: ${{ inputs.cache-name }}|${{ github.ref_name }}|${{ github.sha }}
        compression: zstd

    - name: Skip saving cache (already exists)
      if: steps.cache-check.outputs.cache-matched-key != ''
      shell: sh
      run: echo "Cache already exists for key ${{ inputs.cache-name }}|${{ github.ref_name }}; skipping save."
